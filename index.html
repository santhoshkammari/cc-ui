<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CC-OS · Ship Sleep Repeat</title>
<style>
/* ══════════════════════════════════════════════════════════════════
   CC-OS · UI Redesign — Complete CSS
   ══════════════════════════════════════════════════════════════════ */

/* ── Design Tokens ──────────────────────────────────────────────── */
:root {
  --bg0: #0d1117;
  --bg1: #161b22;
  --bg2: #21262d;
  --bd: #30363d;
  --tx0: #e6edf3;
  --tx1: #8b949e;
  --tx2: #6e7681;
  --blue: #388bfd;
  --green: #3fb950;
  --orange: #f0883e;
  --red: #f85149;
  --purple: #a371f7;
  --usr-bg: #1f3a5c;
  --code-bg: #0d1117;
  --diff-add: #0d1f10;
  --diff-del: #1f0d0d;

  --nav-h: 48px;
  --sidebar-w: 30%;
  --detail-left: 70%;
  --detail-right: 30%;
  --card-h: 58px;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-pill: 20px;
  --transition-fast: 0.15s ease;
  --transition-med: 0.25s ease;
  --transition-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ── Reset ──────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg0);
  color: var(--tx0);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
  height: 100vh;
  overflow: hidden;
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--tx2); }

::selection { background: rgba(56, 139, 253, 0.3); }

/* ── App Shell ──────────────────────────────────────────────────── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  width: 100%;
  overflow: hidden;
}

/* ── Top Navigation ─────────────────────────────────────────────── */
#top-nav {
  display: flex;
  align-items: center;
  height: var(--nav-h);
  min-height: var(--nav-h);
  padding: 0 16px;
  background: var(--bg1);
  border-bottom: 1px solid var(--bd);
  z-index: 100;
  gap: 12px;
  flex-shrink: 0;
}

.nav-brand {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 700;
  font-size: 14px;
  color: var(--tx0);
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: -0.02em;
}

.nav-brand svg,
.nav-brand img {
  width: 20px;
  height: 20px;
}

.nav-tabs {
  display: flex;
  align-items: center;
  gap: 2px;
  margin-left: 12px;
}

.nav-tab {
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--tx2);
  background: transparent;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: color var(--transition-fast), background var(--transition-fast);
  white-space: nowrap;
  line-height: 1;
}

.nav-tab:hover {
  color: var(--tx1);
  background: var(--bg2);
}

.nav-tab.active {
  color: var(--tx0);
  background: var(--bg2);
  font-weight: 600;
}

.nav-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 11px;
  color: var(--tx2);
  white-space: nowrap;
  flex-shrink: 0;
}

.nav-right .nav-stat {
  display: flex;
  align-items: center;
  gap: 4px;
}

.nav-badge {
  background: var(--bg2);
  color: var(--tx2);
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 8px;
  font-weight: 600;
}

/* ── Tab Views ──────────────────────────────────────────────────── */
.tab-view {
  display: none !important;
  flex: 1;
  overflow: hidden;
  flex-direction: column;
}

.tab-view.active {
  display: flex !important;
}

/* ── Agents View ────────────────────────────────────────────────── */
#view-agents {
  position: relative;
  flex: 1;
  flex-direction: column;
  overflow: hidden;
}

#agents-area {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ── Agent Grid ─────────────────────────────────────────────────── */
#agent-grid {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
  align-content: start;
  transition: flex var(--transition-slow);
  min-width: 0;
}

#agent-grid:empty::after {
  content: 'No agents yet — launch one below';
  color: var(--tx2);
  font-size: 13px;
  text-align: center;
  grid-column: 1 / -1;
  padding: 80px 0;
}

/* ── Agent Card (2-line compact, dynamic height) ────────────── */
.agent-card {
  background: var(--bg1);
  border: 1px solid var(--bd);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast), background var(--transition-fast);
  display: flex;
  flex-direction: column;
  min-height: var(--card-h);
  min-width: 0;
  overflow: hidden;
  position: relative;
}

.agent-card:hover {
  border-color: var(--blue);
  box-shadow: 0 0 0 1px rgba(56, 139, 253, 0.15);
}

.agent-card.selected {
  border-color: var(--blue);
  background: color-mix(in srgb, var(--blue) 6%, var(--bg1));
  box-shadow: 0 0 0 1px rgba(56, 139, 253, 0.25);
}

/* Status border-left indicators */
.agent-card.running { border-left: 3px solid var(--orange); }
.agent-card.done    { border-left: 3px solid var(--green); }
.agent-card.error   { border-left: 3px solid var(--red); }
.agent-card.stopped { border-left: 3px solid var(--tx2); }

/* Line 1: Ticker/headline */
.ac-line1 {
  display: flex;
  align-items: center;
  height: 28px;
  min-height: 28px;
  padding: 0 10px;
  overflow: hidden;
  position: relative;
  gap: 6px;
}

.ac-line1::after {
  content: '';
  position: absolute;
  right: 0;
  top: 0;
  bottom: 0;
  width: 24px;
  background: linear-gradient(to right, transparent, var(--bg1));
  pointer-events: none;
  z-index: 1;
}

.agent-card:hover .ac-line1::after,
.agent-card.selected .ac-line1::after {
  background: linear-gradient(to right, transparent, color-mix(in srgb, var(--blue) 6%, var(--bg1)));
}

.ac-ticker {
  font-size: 12px;
  font-weight: 500;
  color: var(--tx0);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
  min-width: 0;
  line-height: 28px;
}

/* Ticker animation */
@keyframes ticker {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

.ac-ticker-animate .ac-ticker {
  overflow: visible;
  text-overflow: unset;
  animation: ticker 12s linear infinite;
  will-change: transform;
}

.ac-ticker-animate .ac-ticker:hover {
  animation-play-state: paused;
}

/* Line 2: Metadata + actions */
.ac-line2 {
  display: flex;
  align-items: center;
  height: 28px;
  min-height: 28px;
  padding: 0 10px;
  gap: 4px;
  overflow: hidden;
  border-top: 1px solid color-mix(in srgb, var(--bd) 40%, transparent);
}

.ac-meta {
  display: flex;
  align-items: center;
  gap: 4px;
  flex: 1;
  min-width: 0;
  overflow: hidden;
}

.ac-meta-item {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  font-size: 10px;
  color: var(--tx2);
  white-space: nowrap;
  background: var(--bg2);
  padding: 1px 6px;
  border-radius: 4px;
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
  line-height: 18px;
}

.ac-meta-item:nth-child(n+5) {
  flex-shrink: 1;
}

.ac-meta-item .icon {
  font-size: 9px;
  flex-shrink: 0;
}

.ac-meta-item.cost { color: var(--green); font-weight: 600; }
.ac-meta-item.tokens { color: var(--tx2); }
.ac-meta-item.time { color: var(--tx2); }

.ac-actions {
  display: flex;
  align-items: center;
  gap: 3px;
  flex-shrink: 0;
  margin-left: auto;
  opacity: 0;
  transition: opacity var(--transition-fast);
}

.agent-card:hover .ac-actions {
  opacity: 1;
}

.ac-btn {
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: var(--radius-sm);
  color: var(--tx1);
  font-size: 10px;
  padding: 2px 7px;
  cursor: pointer;
  white-space: nowrap;
  transition: color var(--transition-fast), background var(--transition-fast), border-color var(--transition-fast);
  line-height: 16px;
}

.ac-btn:hover {
  color: var(--tx0);
  background: var(--bd);
}

.ac-btn.danger:hover {
  color: var(--red);
  background: var(--diff-del);
  border-color: rgba(248, 81, 73, 0.4);
}

/* ── Status Dots ────────────────────────────────────────────────── */
.status-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--tx2);
}

.status-dot.running {
  background: var(--orange);
  animation: pulse-dot 1.5s ease-in-out infinite;
}

.status-dot.done    { background: var(--green); }
.status-dot.error   { background: var(--red); }
.status-dot.stopped { background: var(--tx2); }

@keyframes pulse-dot {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(240, 136, 62, 0.4); }
  50%      { opacity: 0.5; box-shadow: 0 0 0 3px rgba(240, 136, 62, 0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.4; }
}

/* ── Agent Sidebar (single-click, 30% right panel) ──────────── */
#agent-sidebar {
  width: 0;
  min-width: 0;
  height: 100%;
  background: var(--bg1);
  border-left: 1px solid var(--bd);
  z-index: 50;
  display: flex;
  flex-direction: column;
  transition: width var(--transition-slow), min-width var(--transition-slow);
  box-shadow: -4px 0 24px rgba(0, 0, 0, 0.3);
  overflow: hidden;
  flex-shrink: 0;
}

#agent-sidebar.open {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
}

/* No backdrop needed — sidebar is flex-based, not overlay */

.sidebar-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
  min-height: 44px;
  gap: 8px;
}

.sidebar-header h3 {
  font-size: 13px;
  font-weight: 600;
  color: var(--tx0);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;
}

.sidebar-close {
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: var(--radius-sm);
  color: var(--tx1);
  font-size: 14px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: color var(--transition-fast), background var(--transition-fast);
  flex-shrink: 0;
}

.sidebar-close:hover {
  color: var(--tx0);
  background: var(--bd);
}

.sidebar-conv {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* ── Full Detail View (double-click) ────────────────────────────── */
#detail-view {
  display: none;
  flex: 1;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}

#detail-view.open {
  display: flex;
}

#detail-content {
  display: flex;
  flex: 1;
  flex-direction: row;
  overflow: hidden;
}

#detail-topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  border-bottom: 1px solid var(--bd);
  background: var(--bg1);
  flex-shrink: 0;
  min-height: 40px;
}

#detail-topbar .back-btn {
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: var(--radius-sm);
  color: var(--tx1);
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  transition: color var(--transition-fast), background var(--transition-fast);
}

#detail-topbar .back-btn:hover {
  color: var(--tx0);
  background: var(--bd);
}

#detail-topbar .agent-info {
  font-size: 12px;
  color: var(--tx1);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#detail-left {
  width: var(--detail-left);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-right: 1px solid var(--bd);
}

#detail-right {
  width: var(--detail-right);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg0);
}

#detail-conv {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#detail-diff {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 11px;
  line-height: 1.5;
}

/* ── Conversation Messages ──────────────────────────────────────── */

/* Detail chat input area */
#detail-chat {
  padding: 10px 16px 14px;
  flex-shrink: 0;
  border-top: 1px solid var(--bd);
}

#detail-chat .chat-input-box {
  border-radius: var(--radius-md);
}

#detail-chat textarea {
  width: 100%;
  min-height: 44px;
  max-height: 120px;
  background: transparent;
  border: none;
  color: var(--tx0);
  font-size: 13px;
  line-height: 1.6;
  padding: 10px 14px;
  resize: none;
  outline: none;
  font-family: inherit;
}

#detail-chat textarea::placeholder { color: var(--tx2); }

#detail-controls {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px 6px;
}

/* Detail right panel headers */
.diff-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--tx1);
  border-bottom: 1px solid var(--bd);
  background: var(--bg1);
  flex-shrink: 0;
}

#detail-commit-box {
  padding: 10px 12px;
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
}

#detail-commit-msg {
  width: 100%;
  background: var(--bg0);
  border: 1px solid var(--bd);
  border-radius: 6px;
  color: var(--tx0);
  font-size: 12px;
  padding: 7px 10px;
  resize: none;
  font-family: inherit;
  min-height: 36px;
  max-height: 72px;
  outline: none;
}

#detail-commit-msg:focus { border-color: var(--green); }

#detail-commit-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

#detail-commit-actions button {
  flex: 1;
  padding: 5px 8px;
  border-radius: 5px;
  border: 1px solid var(--bd);
  background: var(--bg2);
  color: var(--tx0);
  font-size: 11px;
  cursor: pointer;
  font-weight: 500;
}

#detail-commit-actions button:hover { background: var(--bd); }

#detail-commit-btn {
  background: var(--green) !important;
  border-color: var(--green) !important;
  color: #000 !important;
}

#detail-files {
  flex: 1;
  overflow-y: auto;
}

#detail-diff-content {
  flex: 1;
  overflow-y: auto;
  padding: 0;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  font-size: 11px;
  line-height: 1.5;
}

.msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  line-height: 1.6;
  word-break: break-word;
}

.msg.user {
  background: var(--usr-bg);
  align-self: flex-end;
  border-bottom-right-radius: 3px;
}

.msg.assistant {
  background: var(--bg1);
  border: 1px solid var(--bd);
  align-self: flex-start;
  border-bottom-left-radius: 3px;
}

.msg.tool {
  background: var(--bg0);
  border: 1px solid var(--bd);
  align-self: flex-start;
  border-radius: 6px;
  font-size: 12px;
  width: 100%;
  max-width: 100%;
}

.msg code {
  background: var(--bg0);
  border: 1px solid var(--bd);
  border-radius: 3px;
  padding: 1px 5px;
  font-size: 12px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}

.msg pre {
  background: var(--bg0);
  border: 1px solid var(--bd);
  border-radius: 6px;
  padding: 10px;
  overflow-x: auto;
  margin: 6px 0;
}

.msg pre code {
  background: none;
  border: none;
  padding: 0;
  font-size: 12px;
}

.tool-header {
  color: var(--tx1);
  padding: 6px 10px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  user-select: none;
  font-size: 12px;
}

.tool-header:hover { color: var(--tx0); }

.tool-body {
  padding: 0 10px 8px;
  display: none;
}

.tool-body.open { display: block; }

.tool-body pre {
  background: var(--bg0);
  padding: 8px;
  border-radius: var(--radius-sm);
  overflow-x: auto;
  font-size: 11px;
  color: var(--tx0);
  white-space: pre-wrap;
}

/* ── Agent Groups ───────────────────────────────────────────────── */
.agent-group {
  background: var(--bg0);
  border: 1px solid var(--bd);
  border-left: 3px solid var(--blue);
  border-radius: var(--radius-md);
  align-self: flex-start;
  width: 100%;
  max-width: 100%;
  margin: 4px 0;
  font-size: 12px;
}

.agent-group.agent-done    { border-left-color: var(--green); }
.agent-group.agent-error   { border-left-color: var(--red); }
.agent-group.agent-stopped { border-left-color: var(--tx2); }

.agent-group-header {
  padding: 8px 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  user-select: none;
  color: var(--tx1);
  font-weight: 600;
}

.agent-group-header:hover { color: var(--tx0); }

.agent-group-body {
  display: none;
  padding: 0 10px 8px;
}

.agent-group-body.open { display: block; }

/* ── Tool Groups (horizontal pills) ────────────────────────────── */
.tool-group {
  width: 100%;
  border: 1px solid var(--bd);
  border-radius: 6px;
  background: var(--bg0);
  overflow: hidden;
  flex-shrink: 0;
}
.tool-group.collapsed .tg-body { display: none; }

.tg-header {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 10px;
  cursor: pointer;
  color: var(--tx2);
  font-size: 11px;
  user-select: none;
}
.tg-header:hover { color: var(--tx1); }

.tg-chevron {
  font-size: 9px;
  transition: transform 0.15s;
  display: inline-block;
}
.tool-group:not(.collapsed) .tg-chevron { transform: rotate(90deg); }

.tg-count {
  background: var(--bg2);
  border-radius: 10px;
  padding: 0 6px;
  font-size: 10px;
  font-weight: 600;
  min-width: 18px;
  text-align: center;
}
.tg-label { font-weight: 500; }
.tg-body { padding: 4px 8px 8px; }

.tg-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.tg-pill {
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: var(--radius-pill);
  color: var(--tx1);
  font-size: 11px;
  padding: 2px 10px;
  cursor: pointer;
  transition: all var(--transition-fast);
  white-space: nowrap;
  font-family: inherit;
  line-height: 1.4;
}
.tg-pill:hover { color: var(--tx0); border-color: var(--tx2); }
.tg-pill.active {
  background: rgba(56, 139, 253, 0.15);
  color: var(--blue);
  border-color: var(--blue);
}
.tg-error { color: var(--red); border-color: rgba(248, 81, 73, 0.3); }
.tg-pending { color: var(--orange); border-color: rgba(240, 136, 62, 0.3); }

.tg-pair-content {
  margin-top: 6px;
  background: var(--bg1);
  border: 1px solid var(--bd);
  border-radius: 6px;
  overflow: hidden;
}

.tg-section { border-bottom: 1px solid var(--bd); }
.tg-section:last-child { border-bottom: none; }

.tg-section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--tx2);
  padding: 4px 10px 0;
  font-weight: 600;
}

.tg-section-body {
  padding: 4px 10px 6px;
  font-size: 12px;
  overflow-x: auto;
  max-height: 250px;
  overflow-y: auto;
}

.tg-section-body pre {
  background: var(--bg0);
  padding: 6px;
  border-radius: var(--radius-sm);
  overflow-x: auto;
  font-size: 11px;
  white-space: pre-wrap;
  margin: 2px 0;
}

/* ── Chat Bar ───────────────────────────────────────────────────── */
#chat-bar {
  padding: 10px 16px 14px;
  flex-shrink: 0;
  background: transparent;
  border: none;
  position: relative;
  z-index: 10;
}

.chat-input-box {
  background: var(--bg1);
  border: 1px solid var(--bd);
  border-radius: var(--radius-pill);
  transition: border-color var(--transition-med), box-shadow var(--transition-med), transform var(--transition-fast);
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.25), 0 0 40px rgba(0, 0, 0, 0.1);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.chat-input-box:focus-within {
  border-color: var(--blue);
  box-shadow: 0 6px 36px rgba(0, 0, 0, 0.25), 0 0 0 3px rgba(56, 139, 253, 0.12);
  transform: translateY(-1px);
}

.chat-input-box.dragover {
  border-color: var(--blue);
  border-style: dashed;
  background: rgba(56, 139, 253, 0.06);
}

#cb-prompt {
  width: 100%;
  min-height: 52px;
  max-height: 200px;
  background: transparent;
  border: none;
  color: var(--tx0);
  font-size: 14px;
  line-height: 1.7;
  padding: 12px 18px 4px;
  resize: none;
  outline: none;
  font-family: inherit;
}

#cb-prompt::placeholder { color: var(--tx2); }

.chat-attachments {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 0 16px;
  min-height: 0;
}

.attach-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: 12px;
  padding: 2px 8px 2px 6px;
  font-size: 11px;
  color: var(--tx1);
  animation: chipIn 0.15s ease;
}

.attach-chip .remove {
  cursor: pointer;
  color: var(--tx2);
  font-size: 12px;
  line-height: 1;
}

.attach-chip .remove:hover { color: var(--red); }

@keyframes chipIn {
  from { opacity: 0; transform: scale(0.9); }
  to   { opacity: 1; transform: scale(1); }
}

#cb-controls {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px 8px;
  border-top: 1px solid color-mix(in srgb, var(--bd) 50%, transparent);
  flex-wrap: wrap;
}

#cb-controls select {
  background: var(--bg2);
  border: 1px solid var(--bd);
  border-radius: var(--radius-md);
  color: var(--tx0);
  font-size: 11px;
  padding: 5px 8px;
  cursor: pointer;
  outline: none;
  transition: border-color var(--transition-fast);
}

#cb-controls select:focus {
  outline: none;
  border-color: var(--blue);
}

#cb-controls button {
  background: var(--blue);
  border: none;
  border-radius: var(--radius-md);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  padding: 5px 14px;
  cursor: pointer;
  transition: opacity var(--transition-fast);
}

#cb-controls button:hover { opacity: 0.85; }
#cb-controls button:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── Git Diff Panel ─────────────────────────────────────────────── */
.diff-header {
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--tx1);
  border-bottom: 1px solid var(--bd);
  background: var(--bg1);
  display: flex;
  align-items: center;
  gap: 8px;
}

.diff-file-header {
  color: var(--blue);
  font-weight: 600;
  padding: 4px 6px;
  background: var(--bg2);
  border-radius: var(--radius-sm);
  margin-bottom: 4px;
  word-break: break-all;
  font-size: 11px;
}

.diff-hunk {
  color: var(--tx1);
  font-size: 10px;
  padding: 2px 6px;
}

.diff-add {
  color: var(--green);
  background: var(--diff-add);
  display: block;
  padding: 0 4px;
  border-radius: 2px;
}

.diff-del {
  color: var(--red);
  background: var(--diff-del);
  display: block;
  padding: 0 4px;
  border-radius: 2px;
}

.diff-ctx {
  color: var(--tx2);
  display: block;
  padding: 0 4px;
}

/* ── Right Panel Sections (file list in diff) ───────────────────── */
.rp-section {
  border-bottom: 1px solid var(--bd);
}

.rp-section-hdr {
  padding: 8px 12px;
  font-size: 10px;
  font-weight: 600;
  color: var(--tx2);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  user-select: none;
}

.rp-section-hdr:hover { color: var(--tx1); }

.rp-section-hdr .rp-act {
  margin-left: auto;
  font-size: 9px;
  color: var(--blue);
  cursor: pointer;
  text-transform: none;
  letter-spacing: 0;
}

.rp-section-hdr .rp-act:hover { text-decoration: underline; }

.rp-file {
  padding: 4px 12px 4px 20px;
  font-size: 11px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  color: var(--tx1);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: background var(--transition-fast);
}

.rp-file:hover {
  background: var(--bg2);
  color: var(--tx0);
}

.rp-file.selected {
  background: var(--usr-bg);
  color: var(--tx0);
}

.rp-file-icon {
  font-size: 10px;
  flex-shrink: 0;
}

.rp-file-name {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
}

.rp-file-action {
  opacity: 0;
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 3px;
  border: 1px solid var(--bd);
  background: var(--bg2);
  color: var(--tx1);
  cursor: pointer;
  flex-shrink: 0;
  transition: opacity var(--transition-fast);
}

.rp-file:hover .rp-file-action { opacity: 1; }
.rp-file-action:hover { color: var(--tx0); background: var(--bd); }

/* ── Commit Box ─────────────────────────────────────────────────── */
#commit-box {
  padding: 10px 12px;
  border-bottom: 1px solid var(--bd);
  flex-shrink: 0;
}

#commit-msg {
  width: 100%;
  background: var(--bg0);
  border: 1px solid var(--bd);
  border-radius: 6px;
  color: var(--tx0);
  font-size: 12px;
  padding: 7px 10px;
  resize: none;
  font-family: inherit;
  min-height: 36px;
  max-height: 72px;
  outline: none;
  transition: border-color var(--transition-fast);
}

#commit-msg:focus { border-color: var(--green); }

#commit-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
}

#commit-actions button {
  flex: 1;
  padding: 5px 8px;
  border-radius: 5px;
  border: 1px solid var(--bd);
  background: var(--bg2);
  color: var(--tx0);
  font-size: 11px;
  cursor: pointer;
  font-weight: 500;
  transition: background var(--transition-fast);
}

#commit-actions button:hover { background: var(--bd); }

#commit-btn {
  background: var(--green) !important;
  border-color: var(--green) !important;
  color: #000 !important;
}

#commit-btn:hover { opacity: 0.9 !important; }

/* ── Workspace View ─────────────────────────────────────────────── */
#view-workspace {
  overflow-y: auto;
  padding: 20px;
}

.ws-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.ws-header h2 {
  font-size: 16px;
  font-weight: 600;
}

.ws-search {
  background: var(--bg1);
  border: 1px solid var(--bd);
  border-radius: var(--radius-md);
  color: var(--tx0);
  font-size: 12px;
  padding: 6px 12px;
  outline: none;
  width: 220px;
  transition: border-color var(--transition-fast);
}

.ws-search:focus { border-color: var(--blue); }

#add-ws-btn {
  background: var(--blue);
  border: none;
  border-radius: var(--radius-md);
  color: #fff;
  font-size: 12px;
  padding: 6px 14px;
  cursor: pointer;
  font-weight: 600;
}
#add-ws-btn:hover { opacity: 0.9; }

.ws-grid, #ws-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}

.ws-card {
  background: var(--bg1);
  border: 1px solid var(--bd);
  border-radius: var(--radius-md);
  padding: 12px;
  cursor: pointer;
  transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
}

.ws-card:hover {
  border-color: var(--blue);
  box-shadow: 0 0 0 1px rgba(56, 139, 253, 0.15);
}

.ws-card-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--tx0);
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.ws-card-path {
  font-size: 11px;
  color: var(--tx2);
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.ws-card-meta {
  display: flex;
  gap: 8px;
  margin-top: 8px;
  font-size: 10px;
  color: var(--tx2);
}

.ws-stat {
  display: inline-flex;
  align-items: center;
  gap: 3px;
}

.ws-add-btn {
  background: var(--bg2);
  border: 1px dashed var(--bd);
  border-radius: var(--radius-md);
  padding: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  color: var(--tx2);
  font-size: 12px;
  transition: border-color var(--transition-fast), color var(--transition-fast);
  min-height: 80px;
}

.ws-add-btn:hover {
  border-color: var(--blue);
  color: var(--tx0);
}

/* ── Profile / Settings View ────────────────────────────────────── */
#view-profile {
  overflow-y: auto;
  padding: 24px;
  max-width: 640px;
}

.settings-section {
  margin-bottom: 24px;
}

.settings-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--tx2);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 10px;
}

.settings-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.settings-row label {
  font-size: 12px;
  color: var(--tx1);
  width: 100px;
  flex-shrink: 0;
}

.settings-row input,
.settings-row select {
  flex: 1;
  background: var(--bg0);
  border: 1px solid var(--bd);
  border-radius: var(--radius-sm);
  color: var(--tx0);
  font-size: 12px;
  padding: 5px 8px;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  outline: none;
  transition: border-color var(--transition-fast);
}

.settings-row input:focus,
.settings-row select:focus {
  border-color: var(--blue);
}

.settings-actions {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 1px solid var(--bd);
}

.settings-actions button,
#settings-apply {
  background: var(--blue);
  border: none;
  border-radius: var(--radius-md);
  color: #fff;
  font-size: 13px;
  padding: 8px 20px;
  cursor: pointer;
  font-weight: 600;
}
.settings-actions button:hover,
#settings-apply:hover { opacity: 0.9; }

/* ── Theme Grid ─────────────────────────────────────────────────── */
#theme-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}

.theme-swatch {
  border: 2px solid transparent;
  border-radius: var(--radius-md);
  padding: 8px 6px;
  cursor: pointer;
  text-align: center;
  font-size: 11px;
  transition: border-color var(--transition-fast);
  color: var(--tx1);
}

.theme-swatch:hover { border-color: var(--blue); }
.theme-swatch.selected { border-color: var(--blue); }

.swatch-preview {
  height: 36px;
  border-radius: var(--radius-sm);
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 0 8px;
}

.swatch-preview span {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: block;
}

/* ── Toasts ─────────────────────────────────────────────────────── */
#toast-container {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 2000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.toast {
  background: var(--bg1);
  border: 1px solid var(--bd);
  border-radius: var(--radius-md);
  padding: 10px 16px;
  font-size: 12px;
  color: var(--tx0);
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
  pointer-events: auto;
  animation: slideIn 0.2s ease;
  max-width: 360px;
}

.toast-success { border-left: 3px solid var(--green); }
.toast-error   { border-left: 3px solid var(--red); }
.toast-info    { border-left: 3px solid var(--blue); }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(40px); }
  to   { opacity: 1; transform: translateX(0); }
}

@keyframes panelIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Glass Theme ────────────────────────────────────────────────── */
.glass-theme #top-nav,
.glass-theme #chat-bar,
.glass-theme #commit-box,
.glass-theme #agent-sidebar,
.glass-theme #detail-topbar {
  background: var(--bg1) !important;
  backdrop-filter: blur(24px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
}

.glass-theme .agent-card,
.glass-theme .msg.assistant,
.glass-theme .msg.tool,
.glass-theme .ws-card {
  background: var(--bg0) !important;
  backdrop-filter: blur(16px) saturate(160%) !important;
  -webkit-backdrop-filter: blur(16px) saturate(160%) !important;
}

.glass-theme .chat-input-box {
  background: color-mix(in srgb, var(--bg1) 80%, transparent) !important;
  backdrop-filter: blur(24px) saturate(180%) !important;
  -webkit-backdrop-filter: blur(24px) saturate(180%) !important;
}

.glass-theme #agent-grid,
.glass-theme #detail-conv,
.glass-theme #view-workspace,
.glass-theme #view-profile {
  background: transparent !important;
}

.glass-theme #detail-right {
  background: color-mix(in srgb, var(--bg0) 85%, transparent) !important;
  backdrop-filter: blur(12px) !important;
}

/* ── Responsive ─────────────────────────────────────────────────── */
@media (max-width: 1200px) {
  #agent-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  #theme-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}

@media (max-width: 900px) {
  #detail-left {
    width: 100%;
    border-right: none;
  }

  #detail-right {
    display: none;
  }

  #agent-sidebar {
    --sidebar-w: 50%;
  }
}

@media (max-width: 768px) {
  #agent-grid {
    grid-template-columns: 1fr;
    padding: 8px;
  }

  #agent-sidebar {
    --sidebar-w: 100%;
  }

  #theme-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .nav-tabs {
    gap: 0;
  }

  .nav-tab {
    padding: 6px 10px;
    font-size: 11px;
  }

  .nav-right {
    display: none;
  }

  #chat-bar {
    padding: 8px 10px 10px;
  }

  #cb-prompt {
    min-height: 44px;
    font-size: 13px;
    padding: 10px 14px 4px;
  }

  #view-workspace {
    padding: 12px;
  }

  #view-profile {
    padding: 16px;
  }

  .ws-grid {
    grid-template-columns: 1fr;
  }

  .settings-row {
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }

  .settings-row label {
    width: auto;
  }

  .settings-row input,
  .settings-row select {
    width: 100%;
  }
}

@media (max-width: 480px) {
  .nav-brand span {
    display: none;
  }

  .nav-tab {
    padding: 5px 8px;
    font-size: 10px;
  }

  .ac-meta-item:nth-child(n+4) {
    display: none;
  }
}

/* ── Utility Classes ────────────────────────────────────────────── */
.hidden  { display: none !important; }
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  border: 0;
}

.truncate {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.mono {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
}

/* ── Focus / Accessibility ──────────────────────────────────────── */
:focus-visible {
  outline: 2px solid var(--blue);
  outline-offset: 2px;
}

button:focus-visible,
input:focus-visible,
select:focus-visible,
textarea:focus-visible {
  outline: 2px solid var(--blue);
  outline-offset: 1px;
}

/* ── Transition helpers for JS toggling ─────────────────────────── */
.fade-in  { animation: fadeIn 0.2s ease; }
.fade-out { animation: fadeOut 0.2s ease forwards; }

@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

@keyframes fadeOut {
  from { opacity: 1; }
  to   { opacity: 0; }
}

/* ── Workspace Dialog (modal) ────────────────────────────────────── */
#ws-dialog {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
#ws-dialog.open { display: flex; }
#ws-dialog-box {
  background: var(--bg1);
  border: 1px solid var(--bd);
  border-radius: var(--radius-lg);
  padding: 20px;
  width: 420px;
  max-width: 95vw;
}
#ws-dialog-box h3 {
  font-size: 15px;
  color: var(--tx0);
  margin-bottom: 12px;
}
#ws-path-input {
  width: 100%;
  background: var(--bg0);
  border: 1px solid var(--bd);
  border-radius: var(--radius-md);
  color: var(--tx0);
  font-size: 13px;
  padding: 8px 12px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  margin-bottom: 12px;
  outline: none;
}
#ws-path-input:focus { border-color: var(--blue); }
#ws-dialog-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
#ws-dialog-actions button {
  padding: 6px 16px;
  border-radius: var(--radius-md);
  border: none;
  font-size: 12px;
  cursor: pointer;
  font-weight: 600;
}
#ws-add-cancel {
  background: var(--bg2);
  color: var(--tx1);
  border: 1px solid var(--bd) !important;
}
#ws-add-confirm {
  background: var(--blue);
  color: #fff;
}
#ws-add-cancel:hover { background: var(--bd); }
#ws-add-confirm:hover { opacity: 0.9; }

</style>
</head>
<body>
<div id="app">

  <!-- ── Top Navigation Bar ──────────────────────────────────────── -->
  <nav id="top-nav">
    <div class="nav-brand">
      <span class="nav-logo">⚡ CC-OS</span>
      <span class="nav-tagline">Ship · Sleep · Repeat</span>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" data-tab="agents" onclick="switchTab('agents')">📋 Agents</button>
      <button class="nav-tab" data-tab="workspace" onclick="switchTab('workspace')">📁 Workspaces</button>
      <button class="nav-tab" data-tab="profile" onclick="switchTab('profile')">⚙ Settings</button>
    </div>
    <div class="nav-right">
      <span class="nav-stat" id="task-count" title="Active tasks">0 tasks</span>
      <span class="nav-stat" id="total-cost" title="Total cost">$0.00</span>
    </div>
  </nav>

  <!-- ── Agents View (default) ───────────────────────────────────── -->
  <div id="view-agents" class="tab-view active">
    <div id="agents-area">
      <div id="agent-grid"></div>
      <aside id="agent-sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">Agent Details</span>
          <button class="sidebar-close" onclick="closeSidebar()" title="Close sidebar">✕</button>
        </div>
        <div class="sidebar-conv"></div>
      </aside>
    </div>

    <!-- Chat Bar -->
    <div id="chat-bar">
      <div class="chat-input-box" id="chat-dropzone">
        <textarea id="cb-prompt" placeholder="Describe a task..." rows="2"></textarea>
        <div class="chat-attachments" id="cb-attachments"></div>
        <div id="cb-controls">
          <button class="attach-btn" onclick="document.getElementById('cb-file-picker').click()" title="Attach files">📎</button>
          <input type="file" id="cb-file-picker" multiple style="display:none" />
          <select id="cb-agent">
            <option value="claude-code">Claude Code</option>
            <option value="opencode">OpenCode</option>
            <option value="copilot">Copilot</option>
            <option value="local">Local</option>
          </select>
          <!-- mode is always bypassPermissions, no selector needed -->
          <div style="flex:1"></div>
          <div class="cwd-wrap">
            <input class="cwd-input" id="cb-cwd" placeholder="~/project" autocomplete="off" />
            <div class="cwd-dropdown" id="cwd-dropdown"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Detail View (agent double-click, initially hidden) ──────── -->
  <div id="detail-view">
    <div id="detail-topbar">
      <button id="back-btn" onclick="goBack()">← Back</button>
      <span id="detail-title"></span>
      <span id="detail-cost"></span>
      <span id="detail-tokens"></span>
    </div>
    <div id="detail-content">
      <div id="detail-left">

// ── API Helper ────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── Formatting ────────────────────────────────────────────────────
function formatCost(c) {
  return !c ? '' : c < 0.01 ? c.toFixed(4) : c < 1 ? c.toFixed(3) : c.toFixed(2);
}

function formatTokens(u) {
  if (!u) return '';
  const inp = (u.input_tokens || 0) + (u.cache_read_input_tokens || 0) + (u.cache_creation_input_tokens || 0);
  const out = u.output_tokens || 0;
  if (!inp && !out) return '';
  const f = n => n >= 1e6 ? (n / 1e6).toFixed(1) + 'M' : n >= 1e3 ? (n / 1e3).toFixed(1) + 'k' : n;
  return f(inp) + '↓ ' + f(out) + '↑';
}

function timeAgo(iso) {
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s / 60) + 'm';
  if (s < 86400) return Math.floor(s / 3600) + 'h';
  return Math.floor(s / 86400) + 'd';
}

function formatDateTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const pad = n => String(n).padStart(2, '0');
  return `${pad(d.getHours())}:${pad(d.getMinutes())} ${pad(d.getDate())}/${pad(d.getMonth()+1)}`;
}

function esc(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderMd(text) {
  if (!text) return '';
  let s = esc(text);
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, l, c) => `<pre><code>${c}</code></pre>`);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\n/g, '<br>');
  return s;
}

// ── Agent Badge Helper ────────────────────────────────────────────
function agentBadge(model) {
  const m = (model || 'claude-code').toLowerCase();
  const map = {
    'claude-code': ['CC', 'badge-claude-code'],
    'claude': ['CC', 'badge-claude-code'],
    'sonnet': ['CC', 'badge-claude-code'],
    'opus': ['CC', 'badge-claude-code'],
    'haiku': ['CC', 'badge-claude-code'],
    'opencode': ['OC', 'badge-opencode'],
    'copilot': ['CP', 'badge-copilot'],
    'local': ['LC', 'badge-local'],
    'vllm': ['LC', 'badge-local'],
  };
  const [label, cls] = map[m] || ['CC', 'badge-claude-code'];
  return { label, cls };
}

function agentBadgeHtml(model) {
  const { label, cls } = agentBadge(model);
  return `<span class="ac-meta-item ${cls}" title="Agent">${label}</span>`;
}

function agentBadgeFull(model) {
  const m = (model || 'claude-code').toLowerCase();
  const nameMap = {
    'claude-code': 'Claude Code', 'claude': 'Claude Code', 'sonnet': 'Claude Code',
    'opus': 'Claude Code', 'haiku': 'Claude Code', 'opencode': 'OpenCode',
    'copilot': 'Copilot', 'local': 'Local', 'vllm': 'Local',
  };
  return nameMap[m] || 'Claude Code';
}

function applyTheme(name) {
  const t = THEMES[name];
  if (!t) return;
  const root = document.documentElement;
  for (const [k, v] of Object.entries(t)) {
    if (k !== 'glass') root.style.setProperty('--' + k, v);
  }
  document.body.classList.toggle('glass-theme', !!t.glass);
  document.body.style.background = (name.startsWith('macOS') || name.startsWith('Claude')) && !t.glass
    ? `radial-gradient(ellipse at 30% 0%, color-mix(in srgb, ${t.orange} 8%, ${t.bg0}) 0%, ${t.bg0} 60%)` : '';
  localStorage.setItem('theme', name);
}

function buildThemeGrid() {
  const grid = document.getElementById('theme-grid');
  if (!grid) return;
  const current = localStorage.getItem('theme') || 'GitHub Dark';
  grid.innerHTML = Object.entries(THEMES).map(([name, t]) => {
    const bg = t.glass ? 'linear-gradient(135deg,#1a1a2e,#0a0a0f)' : t.bg1;
    return `<div class="theme-swatch${name === current ? ' selected' : ''}" data-theme="${name}">
      <div class="swatch-preview" style="background:${bg}">
        <span style="background:${t.blue}"></span><span style="background:${t.green}"></span>
        <span style="background:${t.orange}"></span><span style="background:${t.red}"></span>
      </div><div class="swatch-name">${name}</div></div>`;
  }).join('');
  grid.querySelectorAll('.theme-swatch').forEach(el => {
    el.addEventListener('click', () => {
      grid.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      pendingTheme = el.dataset.theme;
    });
  });
}

// ── Tab Switching ─────────────────────────────────────────────────
function switchTab(tabName) {
  activeTab = tabName;

  // Always close detail view and sidebar when switching tabs
  const detail = document.getElementById('detail-view');
  if (detail && detail.classList.contains('open')) {
    detail.classList.remove('open');
    detailTaskId = null;
    detailGitData = { files: [], branch: '' };
    detailSelectedFile = null;
  }
  closeSidebar();

  document.querySelectorAll('.tab-view').forEach(el => el.classList.remove('active'));
  const target = document.getElementById('view-' + tabName);
  if (target) target.classList.add('active');

  document.querySelectorAll('.nav-tab').forEach(el => {
    el.classList.toggle('active', el.dataset.tab === tabName);
  });

  if (tabName === 'agents') {
    refreshTasks();
  } else if (tabName === 'workspace') {
    refreshWorkspaces();
  } else if (tabName === 'profile') {
    loadSettings();
  }
}

function wireTabHandlers() {
  document.querySelectorAll('.nav-tab').forEach(el => {
    el.addEventListener('click', () => {
      const tab = el.dataset.tab;
      if (tab) switchTab(tab);
    });
  });
}

// ── Global Stats in Nav ───────────────────────────────────────────
function updateNavStats() {
  const navRight = document.querySelector('.nav-right');
  if (!navRight) return;
  const running = tasks.filter(t => t.status === 'running').length;
  const totalCost = tasks.reduce((s, t) => s + (t.total_cost || 0), 0);
  let parts = [];
  if (running) parts.push(`<span style="color:var(--orange);font-weight:600">${running} running</span>`);
  parts.push(`<span>${tasks.length} agents</span>`);
  if (totalCost) parts.push(`<span style="color:var(--green);font-weight:600">$${formatCost(totalCost)}</span>`);
  navRight.innerHTML = parts.join(' · ');
}

// ── Task/Agent Management ─────────────────────────────────────────
async function refreshTasks() {
  try {
    tasks = await api('GET', '/tasks');
  } catch (e) {
    return;
  }
  updateNavStats();
  if (activeTab === 'agents') {
    renderAgentCards();
  }
  if (sidebarTaskId) {
    refreshSidebarConversation();
  }
  if (detailTaskId) {
    refreshDetailConversation();
  }
}

// ── Agent Card Rendering ──────────────────────────────────────────
function renderAgentCards() {
  const grid = document.getElementById('agent-grid');
  if (!grid) return;

  if (!tasks.length) {
    grid.innerHTML = '';
    return;
  }

  grid.innerHTML = tasks.map(t => {
    let activity = '';
    for (let i = t.history ? t.history.length - 1 : -1; i >= 0; i--) {
      const m = t.history ? t.history[i] : null;
      if (!m) break;
      if (m.metadata && m.metadata.title) { activity = m.metadata.title; break; }
      if (m.role === 'assistant' && !m.metadata) { activity = (m.content || '').substring(0, 120); break; }
    }
    if (!activity && t.preview) activity = t.preview;

    const tickerText = esc(t.label) + (activity ? ' — ' + esc(activity) : '');
    const cwdShort = t.cwd ? t.cwd.split('/').slice(-2).join('/') : '';
    const tokens = formatTokens(t.usage);
    const isRunning = t.status === 'running';
    const { label: badgeLabel, cls: badgeCls } = agentBadge(t.model);

    let gitBranch = '';
    if (t.branch) gitBranch = t.branch;

    // Time info: start, end, duration
    const startStr = t.created_at ? formatDateTime(t.created_at) : '';
    const endStr = t.finished_at ? formatDateTime(t.finished_at) : '';
    const durationStr = timeAgo(t.created_at);

    let actionsHtml = '';
    if (isRunning) {
      actionsHtml += `<button class="ac-btn" onclick="stopAgent('${t.id}',event)" title="Stop">⏹</button>`;
    }
    if (!isRunning && t.status !== 'done') {
      actionsHtml += `<button class="ac-btn" onclick="resumeAgent('${t.id}',event)" title="Resume">▶</button>`;
    }
    actionsHtml += `<button class="ac-btn danger" onclick="deleteAgent('${t.id}',event)" title="Delete">🗑</button>`;
    actionsHtml += `<button class="ac-btn" onclick="showDiff('${t.id}',event)" title="Diff">±</button>`;

    return `<div class="agent-card ${t.status}${sidebarTaskId === t.id ? ' selected' : ''}" data-id="${t.id}">
      <div class="ac-line1">
        <span class="status-dot ${t.status}"></span>
        <div class="ac-ticker-wrap"><span class="ac-ticker">${tickerText}</span></div>
      </div>
      <div class="ac-line2">
        <div class="ac-meta">
          ${cwdShort ? `<span class="ac-meta-item" title="Directory">📁 ${esc(cwdShort)}</span>` : ''}
          ${gitBranch ? `<span class="ac-meta-item" title="Branch">⎇ ${esc(gitBranch)}</span>` : ''}
          <span class="ac-meta-item ${badgeCls}" title="Agent">${badgeLabel}</span>
          ${tokens ? `<span class="ac-meta-item" title="Tokens">${tokens}</span>` : ''}
          <span class="ac-meta-item" title="Started: ${esc(startStr)}${endStr ? ' → Ended: ' + esc(endStr) : ' (running)'}">🕐 ${esc(startStr)}${endStr ? ' → ' + esc(endStr) : ''} (${durationStr})</span>
        </div>
        <div class="ac-actions" onclick="event.stopPropagation()">
          ${actionsHtml}
        </div>
      </div>
    </div>`;
  }).join('');

  checkTickers();
}

// ── Ticker Animation Check ────────────────────────────────────────
function checkTickers() {
  document.querySelectorAll('.ac-ticker').forEach(el => {
    const wrap = el.parentElement;
    if (el.scrollWidth > wrap.clientWidth) {
      el.classList.add('ac-ticker-animate');
    } else {
      el.classList.remove('ac-ticker-animate');
    }
  });
}

// ── Card Click Handlers (event delegation on grid) ────────────────
function wireCardClickHandlers() {
  // No-op: we use event delegation on #agent-grid now (see wireGridClickDelegation)
}

function wireGridClickDelegation() {
  const grid = document.getElementById('agent-grid');
  if (!grid) return;
  grid.addEventListener('click', (e) => {
    if (e.target.closest('.ac-actions')) return;
    const card = e.target.closest('.agent-card');
    if (!card) return;
    const taskId = card.dataset.id;
    if (!taskId) return;

    if (clickTimer) {
      clearTimeout(clickTimer);
      clickTimer = null;
      openDetailView(taskId);
    } else {
      clickTimer = setTimeout(() => {
        clickTimer = null;
        // Toggle: if same card is already open in sidebar, close it
        if (sidebarTaskId === taskId) {
          closeSidebar();
        } else {
          openSidebar(taskId);
        }
      }, 250);
    }
  });
  // Also handle native dblclick (e.g. from real browser double-click or automation)
  grid.addEventListener('dblclick', (e) => {
    if (e.target.closest('.ac-actions')) return;
    const card = e.target.closest('.agent-card');
    if (!card) return;
    const taskId = card.dataset.id;
    if (!taskId) return;
    if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
    openDetailView(taskId);
  });
}

// ── Single-Click → Sidebar ────────────────────────────────────────
function openSidebar(taskId) {
  sidebarTaskId = taskId;
  const sidebar = document.getElementById('agent-sidebar');
  if (!sidebar) return;
  sidebar.classList.add('open');

  const task = tasks.find(t => t.id === taskId);
  const titleEl = sidebar.querySelector('.sidebar-title');
  if (titleEl && task) {
    titleEl.textContent = task.label || 'Agent';
  }

  // Mark selected card
  document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`.agent-card[data-id="${taskId}"]`);
  if (card) card.classList.add('selected');

  refreshSidebarConversation();
}

async function refreshSidebarConversation() {
  if (!sidebarTaskId) return;
  const conv = document.querySelector('#agent-sidebar .sidebar-conv');
  if (!conv) return;
  try {
    const full = await api('GET', `/tasks/${sidebarTaskId}`);
    renderConversation(full.history, conv);
  } catch (e) {
    conv.innerHTML = `<div style="padding:16px;color:var(--tx2);font-size:12px">${esc(e.message)}</div>`;
  }
}

function closeSidebar() {
  sidebarTaskId = null;
  _tgState.sidebar = { expanded: new Set(), activePill: {} };
  const sidebar = document.getElementById('agent-sidebar');
  if (sidebar) sidebar.classList.remove('open');
  document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('selected'));
}

function wireSidebarClose() {
  document.querySelectorAll('.sidebar-close').forEach(btn => {
    btn.addEventListener('click', closeSidebar);
  });
}

// ── Double-Click → Full Detail View ───────────────────────────────
function openDetailView(taskId) {
  closeSidebar();
  detailTaskId = taskId;

  // Hide agents view, show detail view
  const agentsView = document.getElementById('view-agents');
  const detail = document.getElementById('detail-view');
  if (!detail) return;
  if (agentsView) agentsView.classList.remove('active');
  detail.classList.add('open');

  const task = tasks.find(t => t.id === taskId);
  if (task) {
    const titleEl = document.getElementById('detail-title');
    const costEl = document.getElementById('detail-cost');
    const tokensEl = document.getElementById('detail-tokens');
    const branchEl = document.getElementById('detail-branch');

    if (titleEl) titleEl.textContent = task.label + (task.status === 'running' ? ' ⟳' : '');
    if (costEl) costEl.textContent = task.total_cost ? '$' + formatCost(task.total_cost) : '';
    if (tokensEl) tokensEl.textContent = formatTokens(task.usage) || '';
    if (branchEl) branchEl.textContent = '';
  }

  refreshDetailConversation();
  if (task && task.cwd) {
    refreshDetailGit(task.cwd);
  }
}

async function refreshDetailConversation() {
  if (!detailTaskId) return;
  const conv = document.getElementById('detail-conv');
  if (!conv) return;
  try {
    const full = await api('GET', `/tasks/${detailTaskId}`);
    renderConversation(full.history, conv);
    const task = tasks.find(t => t.id === detailTaskId);
    if (task) {
      const titleEl = document.getElementById('detail-title');
      const costEl = document.getElementById('detail-cost');
      const tokensEl = document.getElementById('detail-tokens');
      if (titleEl) titleEl.textContent = task.label + (task.status === 'running' ? ' ⟳' : '');
      if (costEl) costEl.textContent = task.total_cost ? '$' + formatCost(task.total_cost) : '';
      if (tokensEl) tokensEl.textContent = formatTokens(task.usage) || '';
    }
  } catch (e) {
    conv.innerHTML = `<div style="padding:16px;color:var(--tx2);font-size:12px">${esc(e.message)}</div>`;
  }
}

function goBack() {

  _tgState.detail = { expanded: new Set(), activePill: {} };

async function refreshDetailGit(cwd) {
  if (!cwd) return;
  const filesEl = document.getElementById('detail-files');
  const diffEl = document.getElementById('detail-diff-content');
  const branchEl = document.getElementById('detail-branch');
  try {
    detailGitData = await api('GET', `/git/changed-files?cwd=${encodeURIComponent(cwd)}`);
    if (branchEl) branchEl.textContent = detailGitData.branch || 'detached';
    renderDetailFiles();
  } catch (e) {
    if (filesEl) filesEl.innerHTML = `<div style="padding:12px;color:var(--tx2);font-size:11px">${esc(e.message)}</div>`;
  }
}

function renderDetailFiles() {
  const el = document.getElementById('detail-files');
  if (!el) return;

  const staged = detailGitData.files.filter(f => f.staged);
  const unstaged = detailGitData.files.filter(f => f.unstaged || f.untracked);
  let html = '';

  if (staged.length) {
    html += `<div class="rp-section"><div class="rp-section-hdr">Staged (${staged.length})<span class="rp-act" onclick="detailUnstageAll()">Unstage All</span></div>`;
    html += staged.map(f => `<div class="rp-file${detailSelectedFile === f.path ? ' selected' : ''}" onclick="viewDetailDiff('${esc(f.path)}',true)">
      <span class="rp-file-icon file-${f.index}">${f.index}</span>
      <span class="rp-file-name">${esc(f.path)}</span>
      <span class="rp-file-action" onclick="event.stopPropagation();detailUnstageFile('${esc(f.path)}')">−</span>
    </div>`).join('');
    html += '</div>';
  }
  if (unstaged.length) {
    html += `<div class="rp-section"><div class="rp-section-hdr">Changes (${unstaged.length})<span class="rp-act" onclick="detailStageAll()">Stage All</span></div>`;
    html += unstaged.map(f => `<div class="rp-file${detailSelectedFile === f.path ? ' selected' : ''}" onclick="viewDetailDiff('${esc(f.path)}',false)">
      <span class="rp-file-icon file-${f.untracked ? 'U' : f.working}">${f.untracked ? 'U' : f.working}</span>
      <span class="rp-file-name">${esc(f.path)}</span>
      <span class="rp-file-action" onclick="event.stopPropagation();detailStageFile('${esc(f.path)}')">+</span>
    </div>`).join('');
    html += '</div>';
  }
  if (!staged.length && !unstaged.length) {
    html = '<div style="padding:16px 12px;color:var(--tx2);font-size:12px;text-align:center">Working tree clean ✓</div>';
  }
  el.innerHTML = html;
}

async function viewDetailDiff(file, staged) {

  } catch (e) {

async function detailStageFile(f) {

async function detailUnstageFile(f) {

function renderDiffHtml(diffText) {
  if (!diffText) return '<div style="color:var(--tx2);font-size:11px;padding:8px">No diff</div>';
  const lines = diffText.split('\n');
  let html = '';
  for (const line of lines) {
    if (line.startsWith('diff --git')) continue;
    if (line.startsWith('index ') || line.startsWith('--- ') || line.startsWith('+++ ')) continue;
    if (line.startsWith('@@')) html += `<span class="diff-hunk">${esc(line)}</span>`;
    else if (line.startsWith('+')) html += `<span class="diff-add">${esc(line)}</span>`;
    else if (line.startsWith('-')) html += `<span class="diff-del">${esc(line)}</span>`;
    else if (line.trim()) html += `<span class="diff-ctx">${esc(line)}</span>`;
  }
  return html || '<div style="color:var(--tx2);font-size:11px;padding:8px">No changes</div>';
}

// ── Render Conversation ───────────────────────────────────────────

const TOOL_CATEGORIES = {
  'bash': 'code', 'read': 'code', 'edit': 'code', 'write': 'code',
  'multiEdit': 'code', 'glob': 'code', 'grep': 'code', 'list': 'code',
  'search': 'code', 'find': 'code', 'cat': 'code', 'ls': 'code',
  'websearch': 'web', 'web_search': 'web', 'fetch': 'web',
};

// Preserve expanded/active state across re-renders
const _tgState = { sidebar: { expanded: new Set(), activePill: {} }, detail: { expanded: new Set(), activePill: {} } };
let _tgTarget = 'sidebar';

function extractToolName(title) {
  return (title || '').replace(/^[⚙✓❌⟳\s]+/u, '').trim() || 'tool';
}

function getToolCategory(name) {
  return TOOL_CATEGORIES[name] || name;
}

function _tgTargetOf(el) {
  return el.closest('.sidebar-conv') ? 'sidebar' : 'detail';
}

function toggleToolGroup(el) {
  const group = el.closest('.tool-group');
  group.classList.toggle('collapsed');
  const gidx = parseInt(group.dataset.gidx);
  const t = _tgTargetOf(el);
  if (group.classList.contains('collapsed')) {
    _tgState[t].expanded.delete(gidx);
  } else {
    _tgState[t].expanded.add(gidx);
  }
}

function toggleToolPair(el) {
  const group = el.closest('.tool-group');
  const gidx = parseInt(group.dataset.gidx);
  const t = _tgTargetOf(el);
  const idx = el.dataset.pair;
  const content = group.querySelector('.tg-pair-content[data-pair="' + idx + '"]');
  if (el.classList.contains('active')) {
    el.classList.remove('active');
    if (content) content.style.display = 'none';
    delete _tgState[t].activePill[gidx];
  } else {
    group.querySelectorAll('.tg-pill.active').forEach(p => p.classList.remove('active'));
    group.querySelectorAll('.tg-pair-content').forEach(c => c.style.display = 'none');
    el.classList.add('active');
    if (content) content.style.display = 'block';
    _tgState[t].activePill[gidx] = idx;
  }
}

function renderHistoryHtml(history) {
  if (!history || !history.length) return '';

  // Pass 1: Parse into typed items
  const items = [];
  let i = 0;
  while (i < history.length) {
    const msg = history[i];
    const meta = msg.metadata;

    if (msg.role === 'agent-group') {
      items.push({ type: 'agent-group', msg });
      i++; continue;
    }

    if (meta) {
      const title = meta.title || '';
      const isToolUse = title.includes('⚙') || title.includes('\u2699');

      if (isToolUse) {
        const toolName = extractToolName(title);
        const category = getToolCategory(toolName);
        let resultMsg = null;
        if (i + 1 < history.length) {
          const nm = history[i + 1].metadata;
          if (nm && (nm.title || '').toLowerCase().includes('result')) {
            resultMsg = history[i + 1];
            i += 2;
          } else { i++; }
        } else { i++; }

        items.push({
          type: 'tool-pair', toolName, category,
          pending: meta.status === 'pending',
          inputContent: msg.content,
          resultContent: resultMsg ? resultMsg.content : null,
          resultStatus: !resultMsg ? 'pending'
            : (resultMsg.metadata.title || '').includes('❌') ? 'error' : 'done',
        });
      } else {
        // Standalone metadata item (orphaned result, etc.)
        const pending = meta.status === 'pending';
        const body = msg.content ? '<div class="tool-body">' + renderMd(msg.content) + '</div>' : '';
        items.push({ type: 'html', html: '<div class="msg tool' + (pending ? ' pending' : '') + '"><div class="tool-header" onclick="this.nextElementSibling&&this.nextElementSibling.classList.toggle(\'open\')"><span>' + (pending ? '⟳' : '▶') + '</span><span>' + esc(meta.title) + '</span></div>' + body + '</div>' });
        i++;
      }
    } else {
      if (msg.role === 'user') {
        items.push({ type: 'html', html: '<div class="msg user">' + esc(msg.content) + '</div>' });
      } else {
        items.push({ type: 'html', html: '<div class="msg assistant">' + renderMd(msg.content) + '</div>' });
      }
      i++;
    }
  }

  // Pass 2: Group consecutive tool-pairs by category
  const groups = [];
  let curGroup = null;
  for (const item of items) {
    if (item.type === 'tool-pair') {
      if (curGroup && curGroup.category === item.category) {
        curGroup.pairs.push(item);
      } else {
        if (curGroup) groups.push({ type: 'tool-group', category: curGroup.category, pairs: curGroup.pairs });
        curGroup = { category: item.category, pairs: [item] };
      }
    } else {
      if (curGroup) {
        groups.push({ type: 'tool-group', category: curGroup.category, pairs: curGroup.pairs });
        curGroup = null;
      }
      groups.push(item);
    }
  }
  if (curGroup) groups.push({ type: 'tool-group', category: curGroup.category, pairs: curGroup.pairs });

  // Pass 3: Render
  let gid = 0;
  return groups.map(g => {
    if (g.type === 'tool-group') return renderToolGroupHtml(g, gid++);
    if (g.type === 'agent-group') return renderAgentGroupHtml(g.msg);
    return g.html;
  }).join('');
}

function renderToolGroupHtml(group, gidx) {
  const count = group.pairs.length;
  const hasRunning = group.pairs.some(p => p.pending);
  const catLabel = { code: 'code', web: 'web' }[group.category] || group.category;
  const st = _tgState[_tgTarget];
  const isExpanded = st.expanded.has(gidx);
  const activePairIdx = st.activePill[gidx];

  const pills = group.pairs.map((p, pi) => {
    const icon = p.pending ? '⟳' : (p.resultStatus === 'error' ? '❌' : '✓');
    const cls = p.pending ? ' tg-pending' : (p.resultStatus === 'error' ? ' tg-error' : '');
    const act = (activePairIdx === String(pi)) ? ' active' : '';
    return '<button class="tg-pill' + cls + act + '" data-pair="' + pi + '" onclick="toggleToolPair(this)">' + icon + ' ' + esc(p.toolName) + '</button>';
  }).join('');

  const contents = group.pairs.map((p, pi) => {
    const vis = (activePairIdx === String(pi)) ? 'block' : 'none';
    const inp = p.inputContent
      ? '<div class="tg-section"><div class="tg-section-label">input</div><div class="tg-section-body">' + renderMd(p.inputContent) + '</div></div>'
      : '';
    const out = p.resultContent
      ? '<div class="tg-section"><div class="tg-section-label">output</div><div class="tg-section-body">' + renderMd(p.resultContent) + '</div></div>'
      : '';
    return '<div class="tg-pair-content" data-pair="' + pi + '" style="display:' + vis + '">' + inp + out + '</div>';
  }).join('');

  const collapsed = (hasRunning || isExpanded) ? '' : ' collapsed';

  return '<div class="tool-group' + collapsed + '" data-gidx="' + gidx + '">'
    + '<div class="tg-header" onclick="toggleToolGroup(this)">'
    + '<span class="tg-chevron">▶</span>'
    + '<span class="tg-count">' + count + '</span>'
    + '<span class="tg-label">' + catLabel + '</span>'
    + '</div>'
    + '<div class="tg-body">'
    + '<div class="tg-pills">' + pills + '</div>'
    + contents
    + '</div></div>';
}

function renderAgentGroupHtml(msg) {
  const st = msg.status || 'running';
  const badge = '<span style="font-size:10px;padding:1px 6px;border-radius:8px;font-weight:600;background:rgba('
    + (st === 'running' ? '240,136,62' : st === 'done' ? '63,185,80' : '248,81,73')
    + ',.15);color:var(--' + (st === 'running' ? 'orange' : st === 'done' ? 'green' : 'red') + ')">' + st + '</span>';
  const childrenHtml = renderHistoryHtml(msg.children || []);
  const isRunning = st === 'running';
  return '<div class="agent-group agent-' + st + '">'
    + '<div class="agent-group-header" onclick="this.nextElementSibling&&this.nextElementSibling.classList.toggle(\'open\')">'
    + '<span>' + (isRunning ? '⟳' : '▶') + '</span><span>' + esc(msg.agent_label || 'Agent') + '</span>' + badge
    + '</div>'
    + '<div class="agent-group-body' + (isRunning ? ' open' : '') + '">' + childrenHtml + '</div>'
    + '</div>';
}

function renderConversation(history, container, target) {
  if (!container) return;
  if (!history || !history.length) {
    container.innerHTML = '<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--tx2);font-size:13px">Waiting for response…</div>';
    return;
  }

  _tgTarget = target || (container.classList.contains('sidebar-conv') ? 'sidebar' : 'detail');
  const atBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 80;
  container.innerHTML = renderHistoryHtml(history);
  if (atBottom) container.scrollTop = container.scrollHeight;
}

// ── Chat / Send ───────────────────────────────────────────────────
async function handleSend() {
  const promptEl = document.getElementById('cb-prompt');
  if (!promptEl) return;
  let prompt = promptEl.value.trim();
  if (!prompt && !attachments.length) return;

  if (attachments.length) {
    prompt += '\n\nAttached files:\n' + attachments.map(a => `- ${a}`).join('\n');
  }

  promptEl.value = '';
  promptEl.style.height = 'auto';
  attachments = [];
  renderAttachments();

  const detailView = document.getElementById('detail-view');
  const inDetailView = detailView && detailView.classList.contains('open') && detailTaskId;

  if (inDetailView) {
    try {
      await api('POST', `/tasks/${detailTaskId}/message`, { prompt });
      await refreshTasks();
      refreshDetailConversation();
    } catch (e) { toast('Error: ' + e.message, 'error'); }
  } else {
    const model = document.getElementById('cb-agent') ? document.getElementById('cb-agent').value : 'claude-code';
    const mode = 'bypassPermissions';
    const cwdInput = document.getElementById('cb-cwd') ? document.getElementById('cb-cwd').value.trim() : '';
    const cwd = cwdInput || '';
    const body = { prompt, model, mode, cwd };
    if (model === 'local') {
      const storedModel = localStorage.getItem('vllm_model');
      body.extra = {
        vllm_url: `http://${localStorage.getItem('vllm_ip') || '192.168.170.76'}:${localStorage.getItem('vllm_port') || '8000'}`,
        vllm_model: storedModel !== null ? storedModel : '',
        vllm_key: localStorage.getItem('vllm_key') || 'dummy',
      };
    }
    try {
      await api('POST', '/tasks', body);
      toast('Agent launched', 'success');
      await refreshTasks();
    } catch (e) { toast('Error: ' + e.message, 'error'); }
  }
}

    `<span class="attach-chip">📄 ${esc(a.split('/').pop())}<span class="chip-rm" onclick="removeAttachment(${i})">✕</span></span>`
  ).join('');
}

function removeAttachment(i) {
  attachments.splice(i, 1);
  renderAttachments();
}

function wireFileAttachments() {
  const picker = document.getElementById('cb-file-picker');
  if (picker) {
    picker.addEventListener('change', function() {
      for (const f of this.files) attachments.push(f.name);
      renderAttachments();
      this.value = '';
    });
  }

  const dropzone = document.getElementById('chat-dropzone');
  if (dropzone) {
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      for (const f of e.dataTransfer.files) attachments.push(f.name);
      renderAttachments();
    });
  }
}

function renderWorkspaces() {

  grid.innerHTML = workspaces.map(ws => {
    const agentCount = tasks.filter(t => t.cwd && t.cwd.startsWith(ws.path)).length;
    const runningCount = tasks.filter(t => t.cwd && t.cwd.startsWith(ws.path) && t.status === 'running').length;
    const name = ws.name || ws.path.split('/').pop() || ws.path;
    return `<div class="ws-card" data-id="${ws.id}">
      <div class="ws-card-header">
        <span class="ws-card-name">${esc(name)}</span>
        ${runningCount ? `<span class="ws-card-badge running">${runningCount} running</span>` : ''}

      <div class="ws-card-path">${esc(ws.path)}</div>
      <div class="ws-card-footer">
        <span class="ws-card-agents">${agentCount} agent${agentCount !== 1 ? 's' : ''}</span>
        <button class="ws-card-remove" onclick="removeWorkspace('${ws.id}',event)" title="Remove">✕</button>

async function confirmAddWs() {
  const input = document.getElementById('ws-path-input');
  if (!input) return;
  const path = input.value.trim();
  if (!path) return;
  try {
    await api('POST', '/workspaces', { path });
    toast('Workspace added', 'success');
    closeWsDialog();
    await refreshWorkspaces();
  } catch (e) { toast('Error: ' + e.message, 'error'); }
}

async function removeWorkspace(id, ev) {
  if (ev) ev.stopPropagation();
  try {
    await api('DELETE', `/workspaces/${id}`);
    toast('Workspace removed', 'info');
    await refreshWorkspaces();
  } catch (e) { toast('Error: ' + e.message, 'error'); }
}

function wireWsDialog() {
  const input = document.getElementById('ws-path-input');
  if (input) {
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') confirmAddWs();
      if (e.key === 'Escape') closeWsDialog();
    });
  }
  const dialog = document.getElementById('ws-dialog');
  if (dialog) {
    dialog.addEventListener('click', function(e) {
      if (e.target === this) closeWsDialog();
    });
  }
  const cancelBtn = document.getElementById('ws-add-cancel');
  if (cancelBtn) cancelBtn.addEventListener('click', closeWsDialog);
  const confirmBtn = document.getElementById('ws-add-confirm');
  if (confirmBtn) confirmBtn.addEventListener('click', confirmAddWs);
}

// ── Profile / Settings ────────────────────────────────────────────
function loadSettings() {
  pendingTheme = localStorage.getItem('theme') || 'GitHub Dark';
  buildThemeGrid();
  const ipEl = document.getElementById('s-vllm-ip');
  const portEl = document.getElementById('s-vllm-port');
  const modelEl = document.getElementById('s-vllm-model');
  if (ipEl) ipEl.value = localStorage.getItem('vllm_ip') || '192.168.170.76';
  if (portEl) portEl.value = localStorage.getItem('vllm_port') || '8000';
  if (modelEl) modelEl.value = localStorage.getItem('vllm_model') || '';
}

function wireSettings() {
  const applyBtn = document.getElementById('settings-apply');
  if (applyBtn) {
    applyBtn.addEventListener('click', () => {
      if (pendingTheme) applyTheme(pendingTheme);
      const ipEl = document.getElementById('s-vllm-ip');
      const portEl = document.getElementById('s-vllm-port');
      const modelEl = document.getElementById('s-vllm-model');
      localStorage.setItem('vllm_ip', ipEl ? ipEl.value.trim() || 'localhost' : 'localhost');
      localStorage.setItem('vllm_port', portEl ? portEl.value.trim() || '8000' : '8000');
      localStorage.setItem('vllm_model', modelEl ? modelEl.value.trim() || '' : '');
      toast('Settings saved', 'success');
    });
  }
}

// ── CWD Autocomplete ──────────────────────────────────────────────
let cwdTimeout, cwdSuggestions = [], cwdSelectedIdx = -1;

function wireCwdAutocomplete() {
  const cwdEl = document.getElementById('cb-cwd');
  const cwdDrop = document.getElementById('cwd-dropdown');
  if (!cwdEl || !cwdDrop) return;

  cwdEl.addEventListener('input', function() {
    clearTimeout(cwdTimeout);
    cwdTimeout = setTimeout(() => cwdSearch(this.value.trim()), 250);
  });

  cwdEl.addEventListener('keydown', function(e) {
    if (!cwdDrop.classList.contains('open')) {
      if (e.key === 'Tab') {
        e.preventDefault();
        cwdSearch(this.value.trim());
      }
      return;
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      cwdHighlight(Math.min(cwdSelectedIdx + 1, cwdSuggestions.length - 1));
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      cwdHighlight(Math.max(cwdSelectedIdx - 1, 0));
    } else if (e.key === 'Enter' && cwdSelectedIdx >= 0) {
      e.preventDefault();
      cwdSelect(cwdSelectedIdx);
    } else if (e.key === 'Tab') {
      e.preventDefault();
      if (cwdSelectedIdx >= 0) cwdSelect(cwdSelectedIdx);
      else if (cwdSuggestions.length === 1) cwdSelect(0);
      else if (cwdSuggestions.length > 1) cwdHighlight(0);
    } else if (e.key === 'Escape') {
      cwdHide();
    }
  });

  cwdEl.addEventListener('blur', () => setTimeout(cwdHide, 200));
  cwdEl.addEventListener('focus', function() {
    if (this.value.trim().length >= 1) cwdSearch(this.value.trim());
  });
}

async function cwdSearch(query) {
  if (query.length < 1) { cwdHide(); return; }
  try {
    cwdSuggestions = await api('GET', `/suggest?path=${encodeURIComponent(query)}`);
    if (cwdSuggestions.length) {
      cwdSelectedIdx = -1;
      const cwdDrop = document.getElementById('cwd-dropdown');
      if (!cwdDrop) return;
      cwdDrop.innerHTML = cwdSuggestions.map((p, i) => {
        const parts = p.split('/');
        const name = parts[parts.length - 1] || parts[parts.length - 2] || p;
        const short = parts.slice(-3).join('/');
        return `<div class="cwd-item" data-idx="${i}" onmousedown="cwdSelect(${i})">
          <span class="cwd-icon">📁</span>
          <span class="cwd-path">${esc(name)}</span>
          <span class="cwd-short">${esc(short)}</span>
        </div>`;
      }).join('');
      cwdDrop.classList.add('open');
    } else {
      cwdHide();
    }
  } catch (e) { cwdHide(); }
}

function cwdSelect(idx) {
  const path = cwdSuggestions[idx];
  const cwdEl = document.getElementById('cb-cwd');
  if (path && cwdEl) {
    cwdEl.value = path + '/';
    cwdHide();
    cwdEl.focus();
    clearTimeout(cwdTimeout);
    cwdTimeout = setTimeout(() => cwdSearch(path + '/'), 200);
  }
}

function cwdHide() {
  const cwdDrop = document.getElementById('cwd-dropdown');
  if (cwdDrop) cwdDrop.classList.remove('open');
  cwdSuggestions = [];
  cwdSelectedIdx = -1;
}

function cwdHighlight(idx) {
  cwdSelectedIdx = idx;
  const cwdDrop = document.getElementById('cwd-dropdown');
  if (!cwdDrop) return;
  cwdDrop.querySelectorAll('.cwd-item').forEach((el, i) => {
    el.style.background = i === idx ? 'var(--bg2)' : '';
    el.style.color = i === idx ? 'var(--tx0)' : '';
  });
}

// ── Keyboard Shortcuts ────────────────────────────────────────────
function wireKeyboardShortcuts() {
  const promptEl = document.getElementById('cb-prompt');
  if (promptEl) {
    promptEl.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 200) + 'px';
    });
    promptEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleSend();
      }
    });
  }

  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
      e.preventDefault();
      const picker = document.getElementById('cb-file-picker');
      if (picker) picker.click();
    }
  });
}

// ── Wire Detail View Buttons ──────────────────────────────────────
function wireDetailButtons() {
  const backBtn = document.getElementById('back-btn');
  if (backBtn) backBtn.addEventListener('click', goBack);

  const commitBtn = document.getElementById('detail-commit-btn');
  if (commitBtn) commitBtn.addEventListener('click', detailCommit);

  const pushBtn = document.getElementById('detail-push-btn');
  if (pushBtn) pushBtn.addEventListener('click', detailPush);

  wireDetailPrompt();
}

// ── Polling ───────────────────────────────────────────────────────
async function poll() {
  await refreshTasks();
  if (detailTaskId) {
    const task = tasks.find(t => t.id === detailTaskId);
    if (task && task.cwd) {
      refreshDetailGit(task.cwd);
    }
  }
}

// ── Init ──────────────────────────────────────────────────────────
function init() {
  applyTheme(localStorage.getItem('theme') || 'GitHub Dark');

  wireTabHandlers();
  wireSidebarClose();
  wireGridClickDelegation();
  wireFileAttachments();
  wireWsDialog();
  wireSettings();
  wireCwdAutocomplete();
  wireKeyboardShortcuts();
  wireDetailButtons();

  switchTab('agents');
  refreshWorkspaces();
  refreshTasks();

  setInterval(poll, 2500);
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
