<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CC-UI</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 240px; min-width: 240px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  #sidebar-header { padding: 12px 14px; border-bottom: 1px solid #30363d; font-size: 13px; font-weight: 600; color: #8b949e; letter-spacing: .05em; text-transform: uppercase; }
  #task-list { flex: 1; overflow-y: auto; padding: 6px; }
  .task-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 3px; border: 1px solid transparent; transition: background .1s; }
  .task-item:hover { background: #21262d; }
  .task-item.active { background: #1f3a5c; border-color: #388bfd44; }
  .task-label { font-size: 13px; color: #e6edf3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-meta { font-size: 11px; color: #6e7681; margin-top: 2px; }
  .status-running { color: #f0883e; }
  .status-done { color: #3fb950; }
  .status-stopped { color: #8b949e; }
  .status-error { color: #f85149; }

  #sidebar-actions { padding: 8px; border-top: 1px solid #30363d; display: flex; gap: 6px; }
  #sidebar-actions button { flex: 1; padding: 5px 8px; border-radius: 5px; border: 1px solid #30363d; background: #21262d; color: #e6edf3; font-size: 12px; cursor: pointer; }
  #sidebar-actions button:hover { background: #30363d; }
  #sidebar-actions button.danger:hover { background: #3d1c1c; border-color: #f8514966; color: #f85149; }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  #topbar { padding: 8px 14px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 10px; background: #161b22; font-size: 12px; color: #8b949e; }
  #topbar #task-title { font-size: 14px; color: #e6edf3; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #cwd-wrap { position: relative; }
  #cwd-box { background: #0d1117; border: 1px solid #30363d; border-radius: 5px; color: #8b949e; font-size: 12px; padding: 4px 8px; width: 260px; font-family: monospace; }
  #cwd-box:focus { outline: none; border-color: #388bfd; color: #e6edf3; }
  #cwd-drop { position: absolute; top: 100%; left: 0; width: 100%; background: #161b22; border: 1px solid #388bfd; border-radius: 5px; z-index: 999; display: none; max-height: 200px; overflow-y: auto; }
  .cwd-opt { padding: 5px 10px; font-size: 12px; font-family: monospace; color: #e6edf3; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cwd-opt:hover, .cwd-opt.sel { background: #1f3a5c; }

  /* Chat */
  #chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  #empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: #8b949e; font-size: 14px; flex-direction: column; gap: 8px; }
  #empty-state .hint { font-size: 12px; color: #6e7681; }

  .msg { max-width: 85%; padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; word-break: break-word; }
  .msg.user { background: #1f3a5c; align-self: flex-end; border-bottom-right-radius: 3px; }
  .msg.assistant { background: #161b22; border: 1px solid #30363d; align-self: flex-start; border-bottom-left-radius: 3px; }
  .msg.tool { background: #0d1117; border: 1px solid #30363d; align-self: flex-start; border-radius: 6px; font-size: 12px; width: 100%; max-width: 100%; }
  .tool-header { color: #8b949e; padding: 6px 10px; cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; }
  .tool-header:hover { color: #e6edf3; }
  .tool-body { padding: 0 10px 8px; display: none; }
  .tool-body.open { display: block; }
  .tool-body pre { background: #0d1117; padding: 8px; border-radius: 4px; overflow-x: auto; font-size: 11px; color: #e6edf3; white-space: pre-wrap; }
  .pending { opacity: 0.6; }

  /* Input */
  #input-area { border-top: 1px solid #30363d; padding: 12px 16px; background: #161b22; }
  #input-row { display: flex; gap: 8px; align-items: flex-end; }
  #prompt { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 14px; padding: 10px 14px; resize: none; font-family: inherit; min-height: 44px; max-height: 120px; overflow-y: auto; }
  #prompt:focus { outline: none; border-color: #388bfd; }

  #controls { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  select { background: #21262d; border: 1px solid #30363d; border-radius: 5px; color: #e6edf3; font-size: 12px; padding: 4px 8px; cursor: pointer; }
  select:focus { outline: none; border-color: #388bfd; }
  #stop-btn { background: #3d1c1c; border: 1px solid #f8514944; border-radius: 5px; color: #f85149; font-size: 12px; padding: 4px 10px; cursor: pointer; }
  #stop-btn:hover { background: #5a2020; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  /* Markdown in chat */
  .msg code { background: #0d1117; border: 1px solid #30363d; border-radius: 3px; padding: 1px 5px; font-size: 12px; font-family: monospace; }
  .msg pre { background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 10px; overflow-x: auto; margin: 6px 0; }
  .msg pre code { background: none; border: none; padding: 0; font-size: 12px; }
  .spinner { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { 100% { transform: rotate(360deg); } }

  /* Layer visibility */
  #layer1 { display: flex; flex-direction: row; height: 100vh; width: 100%; }
  #layer2 { display: flex; flex-direction: column; height: 100vh; width: 100%; }
  #dash-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Decorative sidebar */
  #nav-sidebar { width: 200px; min-width: 200px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; padding: 16px 0; gap: 2px; }
  #nav-logo { padding: 4px 16px 16px; font-size: 15px; font-weight: 700; color: #e6edf3; border-bottom: 1px solid #30363d; margin-bottom: 8px; }
  .nav-item { padding: 8px 16px; font-size: 13px; color: #8b949e; cursor: default; border-radius: 6px; margin: 0 6px; display: flex; align-items: center; gap: 10px; }
  .nav-item:hover { background: #21262d; color: #e6edf3; }
  .nav-item.active { background: #1f3a5c; color: #e6edf3; }
  .nav-icon { font-size: 15px; }

  /* Dashboard header */
  #dash-header { padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; justify-content: space-between; }
  #dash-title { font-size: 16px; font-weight: 600; color: #e6edf3; }
  #new-task-btn { background: #238636; border: none; border-radius: 6px; color: #fff; font-size: 13px; padding: 6px 14px; cursor: pointer; font-weight: 600; }
  #new-task-btn:hover { background: #2ea043; }

  /* Kanban board */
  #kanban { flex: 1; display: flex; gap: 16px; padding: 20px; overflow: hidden; }
  .kanban-col { flex: 1; display: flex; flex-direction: column; background: #161b22; border: 1px solid #30363d; border-radius: 10px; overflow: hidden; }
  .col-header { padding: 12px 16px; font-size: 12px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 8px; }
  .col-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-running { background: #f0883e; }
  .dot-done { background: #3fb950; }
  .dot-stopped { background: #8b949e; }
  .col-cards { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }

  /* Task card */
  .task-card { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: border-color .15s; }
  .task-card:hover { border-color: #388bfd; }
  .card-label { font-size: 13px; font-weight: 500; color: #e6edf3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
  .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
  .badge-running { background: #3d2200; color: #f0883e; }
  .badge-done { background: #0f2d14; color: #3fb950; }
  .badge-stopped { background: #1c1c1c; color: #8b949e; }
  .badge-error { background: #2d0f0f; color: #f85149; }
  .card-cwd { font-size: 11px; color: #6e7681; font-family: monospace; }
  .card-time { font-size: 11px; color: #6e7681; margin-left: auto; }
  .card-preview { font-size: 12px; color: #8b949e; margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .col-empty { color: #6e7681; font-size: 12px; padding: 12px; text-align: center; }

  /* Back button in topbar */
  #back-btn { background: #21262d; border: 1px solid #30363d; border-radius: 5px; color: #8b949e; font-size: 12px; padding: 4px 10px; cursor: pointer; flex-shrink: 0; }
  #back-btn:hover { color: #e6edf3; background: #30363d; }

  /* Modal */
  #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
  #modal { background: #161b22; border: 1px solid #30363d; border-radius: 12px; width: 520px; max-width: 95vw; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  #modal-header { display: flex; align-items: center; justify-content: space-between; font-size: 15px; font-weight: 600; color: #e6edf3; }
  #modal-close { background: none; border: none; color: #8b949e; font-size: 16px; cursor: pointer; padding: 0 4px; }
  #modal-close:hover { color: #e6edf3; }
  #modal-prompt { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; font-size: 14px; padding: 10px 14px; resize: none; height: 100px; font-family: inherit; width: 100%; }
  #modal-prompt:focus { outline: none; border-color: #388bfd; }
  #modal-cwd { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #e6edf3; font-size: 13px; padding: 7px 10px; font-family: monospace; }
  #modal-cwd:focus { outline: none; border-color: #388bfd; }
  #modal-fields { display: flex; flex-direction: column; gap: 8px; }
  #modal-fields select { width: 100%; }
  #modal-submit { background: #238636; border: none; border-radius: 6px; color: #fff; font-size: 14px; padding: 9px; cursor: pointer; font-weight: 600; }
  #modal-submit:hover { background: #2ea043; }
</style>
</head>
<body>

<!-- Layer 1: Dashboard -->
<div id="layer1">
  <div id="nav-sidebar">
    <div id="nav-logo">⚡ CC-UI</div>
    <div class="nav-item active"><span class="nav-icon">🗂</span> Tasks</div>
    <div class="nav-item"><span class="nav-icon">📁</span> Projects</div>
    <div class="nav-item"><span class="nav-icon">💻</span> Code</div>
    <div class="nav-item"><span class="nav-icon">📝</span> Notes</div>
    <div class="nav-item"><span class="nav-icon">⚙</span> Settings</div>
  </div>
  <div id="dash-content">
  <div id="dash-header">
    <span id="dash-title">Tasks</span>
    <button id="new-task-btn">+ New Task</button>
  </div>
  <div id="kanban">
    <div class="kanban-col" id="col-running">
      <div class="col-header"><span class="col-dot dot-running"></span>Running</div>
      <div class="col-cards" id="cards-running"></div>
    </div>
    <div class="kanban-col" id="col-done">
      <div class="col-header"><span class="col-dot dot-done"></span>Done</div>
      <div class="col-cards" id="cards-done"></div>
    </div>
    <div class="kanban-col" id="col-stopped">
      <div class="col-header"><span class="col-dot dot-stopped"></span>Stopped / Error</div>
      <div class="col-cards" id="cards-stopped"></div>
    </div>
  </div>
  </div><!-- end dash-content -->
</div>

<!-- Layer 2: Task detail (chat) -->
<div id="layer2" style="display:none">
  <div id="topbar">
    <button id="back-btn">← Back</button>
    <span id="task-title">No task selected</span>
    <div id="cwd-wrap">
      <input id="cwd-box" placeholder="/path/to/project" title="Working directory for new tasks" autocomplete="off" />
      <div id="cwd-drop"></div>
    </div>
  </div>

  <div id="chat">
    <div id="empty-state">
      <div>Type a prompt below to start a task</div>
      <div class="hint">Tasks run in background — switch between them freely</div>
    </div>
  </div>

  <div id="input-area">
    <div id="input-row">
      <textarea id="prompt" placeholder="Follow-up message…" rows="1"></textarea>
    </div>
    <div id="controls">
      <select id="model-sel">
        <option value="claude">claude</option>
        <option value="qwen">qwen</option>
        <option value="opencode">opencode</option>
      </select>
      <select id="mode-sel">
        <option value="bypassPermissions">bypassPermissions</option>
        <option value="acceptEdits">acceptEdits</option>
        <option value="dontAsk">dontAsk</option>
        <option value="default">default</option>
        <option value="plan">plan</option>
      </select>
      <button id="stop-btn" onclick="stopActive()">⏹ stop active</button>
    </div>
  </div>
</div>

<!-- New Task Modal -->
<div id="modal-overlay" style="display:none">
  <div id="modal">
    <div id="modal-header">
      <span>New Task</span>
      <button id="modal-close">✕</button>
    </div>
    <textarea id="modal-prompt" placeholder="What should Claude do?"></textarea>
    <div id="modal-fields">
      <input id="modal-cwd" placeholder="/path/to/project" autocomplete="off" />
      <select id="modal-model">
        <option value="claude">claude</option>
        <option value="qwen">qwen</option>
        <option value="opencode">opencode</option>
      </select>
      <select id="modal-mode">
        <option value="bypassPermissions">bypassPermissions</option>
        <option value="acceptEdits">acceptEdits</option>
        <option value="dontAsk">dontAsk</option>
        <option value="default">default</option>
        <option value="plan">plan</option>
      </select>
    </div>
    <button id="modal-submit">Start Task</button>
  </div>
</div>

<script>
const API = 'http://localhost:8001';
let activeTaskId = null;
let tasks = [];
let pollInterval = null;

function timeAgo(iso) {
  const sec = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (sec < 60) return sec + 's ago';
  if (sec < 3600) return Math.floor(sec/60) + 'm ago';
  if (sec < 86400) return Math.floor(sec/3600) + 'h ago';
  return Math.floor(sec/86400) + 'd ago';
}

function showLayer(n) {
  document.getElementById('layer1').style.display = n === 1 ? 'flex' : 'none';
  document.getElementById('layer2').style.display = n === 2 ? 'flex' : 'none';
}

async function openTask(id) {
  showLayer(2);
  await selectTask(id);
}

function renderKanban() {
  const buckets = { running: [], done: [], stopped: [] };
  for (const t of tasks) {
    const key = (t.status === 'error') ? 'stopped' : (buckets[t.status] !== undefined ? t.status : 'stopped');
    buckets[key].push(t);
  }
  for (const [col, list] of Object.entries(buckets)) {
    const el = document.getElementById('cards-' + col);
    if (!el) continue;
    if (!list.length) {
      el.innerHTML = '<div class="col-empty">No tasks</div>';
      continue;
    }
    el.innerHTML = list.map(t => {
      const cwdShort = t.cwd ? t.cwd.split('/').slice(-2).join('/') : '';
      const badge = t.status === 'error' ? 'error' : t.status;
      const preview = t.preview ? esc(t.preview) : '';
      return `<div class="task-card" onclick="openTask('${t.id}')">
        <div class="card-label">${esc(t.label)}</div>
        <div class="card-meta">
          <span class="card-badge badge-${badge}">${badge}</span>
          <span class="card-cwd">${esc(cwdShort)}</span>
          <span class="card-time">${timeAgo(t.created_at)}</span>
        </div>
        ${preview ? `<div class="card-preview">${preview}</div>` : ''}
      </div>`;
    }).join('');
  }
}

// ── API ──────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── Render task list ─────────────────────────────────────────────────
function renderTaskList() {
  renderKanban();
}

// ── Render chat ───────────────────────────────────────────────────────
function renderChat(history) {
  const chat = document.getElementById('chat');
  const empty = document.getElementById('empty-state');

  if (!history || !history.length) {
    chat.innerHTML = '';
    chat.appendChild(empty || makeEmpty());
    return;
  }

  const msgs = history.map(msg => {
    const role = msg.role;
    const meta = msg.metadata;

    if (meta) {
      // Tool call accordion
      const pending = meta.status === 'pending';
      const body = msg.content ? `<div class="tool-body">${renderMd(msg.content)}</div>` : '';
      return `<div class="msg tool${pending ? ' pending' : ''}">
        <div class="tool-header" onclick="toggleTool(this)">
          <span>${pending ? '⟳' : '▶'}</span>
          <span>${esc(meta.title)}</span>
        </div>
        ${body}
      </div>`;
    }

    if (role === 'user') {
      return `<div class="msg user">${esc(msg.content)}</div>`;
    }
    return `<div class="msg assistant">${renderMd(msg.content)}</div>`;
  }).join('');

  const atBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 80;
  chat.innerHTML = msgs;
  if (atBottom) chat.scrollTop = chat.scrollHeight;
}

function toggleTool(header) {
  const body = header.nextElementSibling;
  if (body) body.classList.toggle('open');
}

function makeEmpty() {
  const d = document.createElement('div');
  d.id = 'empty-state';
  d.innerHTML = '<div>Type a prompt below to start a task</div><div class="hint">Tasks run in background — switch between them freely</div>';
  return d;
}

// Simple markdown: code blocks, inline code, bold
function renderMd(text) {
  if (!text) return '';
  let s = esc(text);
  // fenced code blocks
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code}</code></pre>`);
  // inline code
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // bold
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // newlines
  s = s.replace(/\n/g, '<br>');
  return s;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Actions ───────────────────────────────────────────────────────────
function newTask() {
  document.getElementById('modal-overlay').style.display = 'flex';
  document.getElementById('modal-prompt').value = '';
  document.getElementById('modal-cwd').value = '';
  setTimeout(() => document.getElementById('modal-prompt').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

async function submitModal() {
  const prompt = document.getElementById('modal-prompt').value.trim();
  if (!prompt) return;
  const model = document.getElementById('modal-model').value;
  const mode = document.getElementById('modal-mode').value;
  const cwd = document.getElementById('modal-cwd').value.trim();
  closeModal();
  const result = await api('POST', '/tasks', { prompt, model, mode, cwd });
  await refreshTasks();
  openTask(result.id);
}

async function selectTask(id) {
  activeTaskId = id;
  const task = tasks.find(t => t.id === id);
  if (task) {
    document.getElementById('task-title').textContent = task.label;
    document.getElementById('cwd-box').value = task.cwd;
  }
  renderTaskList();
  const full = await api('GET', `/tasks/${id}`);
  renderChat(full.history);
}

async function sendPrompt() {
  const promptEl = document.getElementById('prompt');
  const prompt = promptEl.value.trim();
  if (!prompt) return;

  const active = tasks.find(t => t.id === activeTaskId);
  if (!active) return;

  promptEl.value = '';
  promptEl.style.height = 'auto';

  await api('POST', `/tasks/${activeTaskId}/message`, { prompt });
  await refreshTasks();
}

async function stopActive() {
  if (!activeTaskId) return;
  await api('POST', `/tasks/${activeTaskId}/stop`);
  await refreshTasks();
}

async function deleteActive() {
  if (!activeTaskId) return;
  await api('DELETE', `/tasks/${activeTaskId}`);
  activeTaskId = null;
  document.getElementById('task-title').textContent = 'No task selected';
  renderChat([]);
  await refreshTasks();
}

// ── Poll ──────────────────────────────────────────────────────────────
async function refreshTasks() {
  tasks = await api('GET', '/tasks');
  renderTaskList();
}

async function pollActive() {
  await refreshTasks();
  if (activeTaskId) {
    const full = await api('GET', `/tasks/${activeTaskId}`);
    renderChat(full.history);
    // Update title status
    const t = tasks.find(x => x.id === activeTaskId);
    if (t) document.getElementById('task-title').textContent = t.label + (t.status === 'running' ? ' ⟳' : '');
  }
}

// Auto-resize textarea
document.getElementById('prompt').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Enter to send (Shift+Enter for newline)
document.getElementById('prompt').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendPrompt();
  }
});

// ── CWD autocomplete ──────────────────────────────────────────────────
(function() {
  const inp = document.getElementById('cwd-box');
  const drop = document.getElementById('cwd-drop');
  let selIdx = -1, opts = [], t;

  function show(items) {
    opts = items; selIdx = -1;
    drop.innerHTML = items.map((p, i) =>
      `<div class="cwd-opt" data-i="${i}">${p}</div>`).join('');
    drop.style.display = items.length ? 'block' : 'none';
    drop.querySelectorAll('.cwd-opt').forEach(el =>
      el.addEventListener('mousedown', e => { e.preventDefault(); pick(+el.dataset.i); }));
  }

  function pick(i) {
    inp.value = opts[i] + '/';
    drop.style.display = 'none';
    inp.focus();
    inp.dispatchEvent(new Event('input'));
  }

  function highlight() {
    drop.querySelectorAll('.cwd-opt').forEach((el, i) =>
      el.classList.toggle('sel', i === selIdx));
  }

  inp.addEventListener('input', () => {
    clearTimeout(t);
    t = setTimeout(async () => {
      const res = await fetch(`${API}/suggest?path=${encodeURIComponent(inp.value)}`);
      show(await res.json());
    }, 50);
  });

  inp.addEventListener('keydown', e => {
    if (drop.style.display === 'none') return;
    if (e.key === 'ArrowDown') { e.preventDefault(); selIdx = Math.min(selIdx + 1, opts.length - 1); highlight(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); selIdx = Math.max(selIdx - 1, 0); highlight(); }
    else if (e.key === 'Enter' || e.key === 'Tab') { if (selIdx >= 0) { e.preventDefault(); pick(selIdx); } }
    else if (e.key === 'Escape') { drop.style.display = 'none'; }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#cwd-wrap')) drop.style.display = 'none';
  });
})();

// Modal
document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('modal-submit').addEventListener('click', submitModal);
document.getElementById('new-task-btn').addEventListener('click', newTask);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});
document.getElementById('modal-prompt').addEventListener('keydown', e => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) submitModal();
});

// Back button
document.getElementById('back-btn').addEventListener('click', () => showLayer(1));

// Start polling
showLayer(1);
setInterval(pollActive, 2000);
refreshTasks();
</script>
</body>
</html>
