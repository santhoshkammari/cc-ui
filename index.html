<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CC-UI</title>
<style>
  :root {
    --bg0: #0d1117; --bg1: #161b22; --bg2: #21262d;
    --bd: #30363d;
    --tx0: #e6edf3; --tx1: #8b949e; --tx2: #6e7681;
    --blue: #388bfd; --green: #3fb950; --orange: #f0883e; --red: #f85149;
    --usr-bg: #1f3a5c; --code-bg: #0d1117;
    --diff-add: #0d1f10; --diff-del: #1f0d0d;
  }
  /* Settings panel */
  #settings-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; align-items:center; justify-content:center; }
  #settings-overlay.open { display:flex; }
  #settings-box { background:var(--bg1); border:1px solid var(--bd); border-radius:12px; padding:24px; width:420px; max-width:95vw; }
  #settings-box h2 { font-size:15px; font-weight:700; color:var(--tx0); margin-bottom:16px; }
  .settings-label { font-size:11px; font-weight:600; color:var(--tx2); text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }
  #theme-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:20px; }
  .theme-swatch { border:2px solid transparent; border-radius:8px; padding:8px 6px; cursor:pointer; text-align:center; font-size:11px; transition:border-color .15s; }
  .theme-swatch:hover { border-color:var(--blue); }
  .theme-swatch.selected { border-color:var(--blue); }
  .swatch-preview { width:100%; height:28px; border-radius:5px; margin-bottom:5px; display:flex; gap:3px; padding:4px; }
  .swatch-preview span { flex:1; border-radius:3px; }
  .swatch-name { color:var(--tx1); font-size:11px; }
  #settings-footer { display:flex; justify-content:flex-end; gap:8px; }
  #settings-cancel { background:var(--bg2); border:1px solid var(--bd); border-radius:6px; color:var(--tx1); font-size:13px; padding:6px 14px; cursor:pointer; }
  #settings-apply { background:var(--blue); border:none; border-radius:6px; color:#fff; font-size:13px; padding:6px 14px; cursor:pointer; font-weight:600; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg0); color: var(--tx0); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; overflow: hidden; }

  /* Sidebar */
  #sidebar { width: 240px; min-width: 240px; background: var(--bg1); border-right: 1px solid var(--bd); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  #sidebar-header { padding: 12px 14px; border-bottom: 1px solid var(--bd); font-size: 13px; font-weight: 600; color: var(--tx1); letter-spacing: .05em; text-transform: uppercase; }
  #task-list { flex: 1; overflow-y: auto; padding: 6px; }
  .task-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; margin-bottom: 3px; border: 1px solid transparent; transition: background .1s; }
  .task-item:hover { background: var(--bg2); }
  .task-item.active { background: var(--usr-bg); border-color: var(--blue); }
  .task-label { font-size: 13px; color: var(--tx0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-meta { font-size: 11px; color: var(--tx2); margin-top: 2px; }
  .status-running { color: var(--orange); }
  .status-done { color: var(--green); }
  .status-stopped { color: var(--tx1); }
  .status-error { color: var(--red); }

  #sidebar-actions { padding: 8px; border-top: 1px solid var(--bd); display: flex; gap: 6px; }
  #sidebar-actions button { flex: 1; padding: 5px 8px; border-radius: 5px; border: 1px solid var(--bd); background: var(--bg2); color: var(--tx0); font-size: 12px; cursor: pointer; }
  #sidebar-actions button:hover { background: var(--bd); }
  #sidebar-actions button.danger:hover { background: var(--diff-del); border-color: var(--red)66; color: var(--red); }

  /* Main */
  #main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  #topbar { padding: 8px 14px; border-bottom: 1px solid var(--bd); display: flex; align-items: center; gap: 10px; background: var(--bg1); font-size: 12px; color: var(--tx1); }
  #topbar #task-title { font-size: 14px; color: var(--tx0); font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #cwd-wrap { position: relative; }
  #cwd-box { background: var(--bg0); border: 1px solid var(--bd); border-radius: 5px; color: var(--tx1); font-size: 12px; padding: 4px 8px; width: 325px; font-family: monospace; }
  #cwd-box:focus { outline: none; border-color: var(--blue); color: var(--tx0); }
  #cwd-drop { position: absolute; top: 100%; left: 0; width: 100%; background: var(--bg1); border: 1px solid var(--blue); border-radius: 5px; z-index: 999; display: none; max-height: 200px; overflow-y: auto; }
  .cwd-opt { padding: 5px 10px; font-size: 12px; font-family: monospace; color: var(--tx0); cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cwd-opt:hover, .cwd-opt.sel { background: var(--usr-bg); }

  /* Chat */
  #chat { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  #empty-state { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--tx1); font-size: 14px; flex-direction: column; gap: 8px; }
  #empty-state .hint { font-size: 12px; color: var(--tx2); }

  .msg { max-width: 85%; padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; word-break: break-word; }
  .msg.user { background: var(--usr-bg); align-self: flex-end; border-bottom-right-radius: 3px; }
  .msg.assistant { background: var(--bg1); border: 1px solid var(--bd); align-self: flex-start; border-bottom-left-radius: 3px; }
  .msg.tool { background: var(--bg0); border: 1px solid var(--bd); align-self: flex-start; border-radius: 6px; font-size: 12px; width: 100%; max-width: 100%; }
  .tool-header { color: var(--tx1); padding: 6px 10px; cursor: pointer; display: flex; align-items: center; gap: 6px; user-select: none; }
  .tool-header:hover { color: var(--tx0); }
  .tool-body { padding: 0 10px 8px; display: none; }
  .tool-body.open { display: block; }
  .tool-body pre { background: var(--bg0); padding: 8px; border-radius: 4px; overflow-x: auto; font-size: 11px; color: var(--tx0); white-space: pre-wrap; }
  .pending { opacity: 0.6; }

  /* Input */
  #input-area { border-top: 1px solid var(--bd); padding: 12px 16px; background: var(--bg1); }
  #input-row { display: flex; gap: 8px; align-items: flex-end; }
  #prompt { flex: 1; background: var(--bg0); border: 1px solid var(--bd); border-radius: 8px; color: var(--tx0); font-size: 14px; padding: 10px 14px; resize: none; font-family: inherit; min-height: 44px; max-height: 120px; overflow-y: auto; }
  #prompt:focus { outline: none; border-color: var(--blue); }

  #controls { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  select { background: var(--bg2); border: 1px solid var(--bd); border-radius: 5px; color: var(--tx0); font-size: 12px; padding: 4px 8px; cursor: pointer; }
  select:focus { outline: none; border-color: var(--blue); }
  #stop-btn { background: var(--diff-del); border: 1px solid var(--red)44; border-radius: 5px; color: var(--red); font-size: 12px; padding: 4px 10px; cursor: pointer; }
  #stop-btn:hover { background: var(--diff-del); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bd); border-radius: 3px; }

  /* Markdown in chat */
  .msg code { background: var(--bg0); border: 1px solid var(--bd); border-radius: 3px; padding: 1px 5px; font-size: 12px; font-family: monospace; }
  .msg pre { background: var(--bg0); border: 1px solid var(--bd); border-radius: 6px; padding: 10px; overflow-x: auto; margin: 6px 0; }
  .msg pre code { background: none; border: none; padding: 0; font-size: 12px; }
  .spinner { display: inline-block; animation: spin 1s linear infinite; }
  @keyframes spin { 100% { transform: rotate(360deg); } }

  /* Layer visibility */
  #layer1 { display: flex; flex-direction: row; height: 100vh; width: 100%; }
  #layer2 { display: flex; flex-direction: row; height: 100vh; width: 100%; }
  #chat-panel { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; min-width: 0; }
  #dash-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* Layer 2 layout with git panel */
  #git-panel { width: 25%; min-width: 260px; max-width: 400px; background: var(--bg0); border-left: 1px solid var(--bd); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  #git-panel-header { padding: 10px 14px; background: var(--bg1); border-bottom: 1px solid var(--bd); display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; color: var(--tx1); letter-spacing: .05em; text-transform: uppercase; }
  #git-repo-badge { background: var(--diff-add); color: var(--green); font-size: 10px; padding: 1px 6px; border-radius: 8px; font-weight: 600; text-transform: none; letter-spacing: 0; }
  #git-status-section { padding: 10px 14px; border-bottom: 1px solid var(--bd); flex-shrink: 0; max-height: 160px; overflow-y: auto; }
  #git-diff-section { flex: 1; overflow-y: auto; padding: 10px 14px; }
  .git-section-label { font-size: 10px; font-weight: 600; color: var(--tx2); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
  #git-status-content { font-size: 11px; font-family: monospace; color: var(--tx1); white-space: pre-wrap; line-height: 1.5; }
  #git-diff-content { font-size: 11px; font-family: monospace; line-height: 1.5; }
  .diff-file { margin-bottom: 12px; }
  .diff-file-header { color: var(--blue); font-weight: 600; font-size: 11px; padding: 4px 6px; background: var(--bg1); border-radius: 4px; margin-bottom: 4px; word-break: break-all; }
  .diff-hunk { color: var(--tx1); font-size: 10px; padding: 2px 0; }
  .diff-add { color: var(--green); background: var(--diff-add); display: block; padding: 0 4px; border-radius: 2px; }
  .diff-del { color: var(--red); background: var(--diff-del); display: block; padding: 0 4px; border-radius: 2px; }
  .diff-ctx { color: var(--tx2); display: block; padding: 0 4px; }
  #git-no-repo { color: var(--tx2); font-size: 12px; padding: 16px 14px; }

  /* Decorative sidebar */
  #nav-sidebar { width: 200px; min-width: 200px; background: var(--bg1); border-right: 1px solid var(--bd); display: flex; flex-direction: column; padding: 16px 0; gap: 2px; }
  #nav-logo { padding: 4px 16px 16px; font-size: 15px; font-weight: 700; color: var(--tx0); border-bottom: 1px solid var(--bd); margin-bottom: 8px; }
  .nav-item { padding: 8px 16px; font-size: 13px; color: var(--tx1); cursor: default; border-radius: 6px; margin: 0 6px; display: flex; align-items: center; gap: 10px; }
  .nav-item:hover { background: var(--bg2); color: var(--tx0); }
  .nav-item.active { background: var(--usr-bg); color: var(--tx0); }
  .nav-icon { font-size: 15px; }

  /* Dashboard header */
  #dash-header { padding: 12px 20px; background: var(--bg1); border-bottom: 1px solid var(--bd); display: flex; align-items: center; justify-content: space-between; }
  #dash-title { font-size: 16px; font-weight: 600; color: var(--tx0); }
  #new-task-btn { background: var(--green); border: none; border-radius: 6px; color: #fff; font-size: 13px; padding: 6px 14px; cursor: pointer; font-weight: 600; }
  #new-task-btn:hover { background: var(--green); }

  /* Kanban board */
  #kanban { flex: 1; display: flex; gap: 16px; padding: 20px; overflow: hidden; }
  .kanban-col { flex: 1; display: flex; flex-direction: column; background: var(--bg1); border: 1px solid var(--bd); border-radius: 10px; overflow: hidden; }
  .col-header { padding: 12px 16px; font-size: 12px; font-weight: 600; color: var(--tx1); text-transform: uppercase; letter-spacing: .05em; border-bottom: 1px solid var(--bd); display: flex; align-items: center; gap: 8px; }
  .col-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot-running { background: var(--orange); }
  .dot-done { background: var(--green); }
  .dot-stopped { background: var(--tx1); }
  .col-cards { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }

  /* Task card */
  .task-card { background: var(--bg0); border: 1px solid var(--bd); border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: border-color .15s; }
  .task-card:hover { border-color: var(--blue); }
  .card-label { font-size: 13px; font-weight: 500; color: var(--tx0); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; }
  .card-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-badge { font-size: 11px; padding: 2px 7px; border-radius: 10px; font-weight: 600; }
  .badge-running { background: var(--diff-del); color: var(--orange); }
  .badge-done { background: var(--diff-add); color: var(--green); }
  .badge-stopped { background: var(--bg2); color: var(--tx1); }
  .badge-error { background: var(--diff-del); color: var(--red); }
  .card-cwd { font-size: 11px; color: var(--tx2); font-family: monospace; }
  .card-dur { font-size: 11px; color: var(--tx2); }
  .card-time { font-size: 11px; color: var(--tx2); margin-left: auto; }
  .card-preview { font-size: 12px; color: var(--tx1); margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .col-empty { color: var(--tx2); font-size: 12px; padding: 12px; text-align: center; }

  /* Back button in topbar */
  #back-btn { background: var(--bg2); border: 1px solid var(--bd); border-radius: 5px; color: var(--tx1); font-size: 12px; padding: 4px 10px; cursor: pointer; flex-shrink: 0; }
  #back-btn:hover { color: var(--tx0); background: var(--bd); }

  /* Dashboard bottom chat bar */
  #dash-input-area { border-top: 1px solid var(--bd); padding: 12px 16px; background: var(--bg1); }
  #dash-input-row { display: flex; gap: 8px; align-items: flex-end; }
  #dash-prompt { flex: 1; background: var(--bg0); border: 1px solid var(--bd); border-radius: 8px; color: var(--tx0); font-size: 14px; padding: 10px 14px; resize: none; font-family: inherit; min-height: 44px; max-height: 120px; overflow-y: auto; }
  #dash-prompt:focus { outline: none; border-color: var(--green); }
  #dash-controls { display: flex; gap: 8px; margin-top: 8px; align-items: center; }
  #dash-cwd:focus { outline: none; border-color: var(--blue); color: var(--tx0); }
</style>
</head>
<body>

<!-- Layer 1: Dashboard -->
<div id="layer1">
  <div id="nav-sidebar">
    <div id="nav-logo">⚡ CC-UI</div>
    <div class="nav-item active"><span class="nav-icon">🗂</span> Tasks</div>
    <div class="nav-item"><span class="nav-icon">📁</span> Projects</div>
    <div class="nav-item"><span class="nav-icon">💻</span> Code</div>
    <div class="nav-item"><span class="nav-icon">📝</span> Notes</div>
    <div class="nav-item" id="nav-settings" style="cursor:pointer"><span class="nav-icon">⚙</span> Settings</div>
  </div>
  <div id="dash-content">
  <div id="dash-header">
    <span id="dash-title">Tasks</span>
    <button id="new-task-btn">+ New Task</button>
  </div>
  <div id="kanban">
    <div class="kanban-col" id="col-running">
      <div class="col-header"><span class="col-dot dot-running"></span>Running</div>
      <div class="col-cards" id="cards-running"></div>
    </div>
    <div class="kanban-col" id="col-done">
      <div class="col-header"><span class="col-dot dot-done"></span>Done</div>
      <div class="col-cards" id="cards-done"></div>
    </div>
    <div class="kanban-col" id="col-stopped">
      <div class="col-header"><span class="col-dot dot-stopped"></span>Stopped / Error</div>
      <div class="col-cards" id="cards-stopped"></div>
    </div>
  </div>
  <div id="dash-input-area">
    <div id="dash-input-row">
      <textarea id="dash-prompt" placeholder="Type a task and press Enter…" rows="1"></textarea>
    </div>
    <div id="dash-controls">
      <select id="dash-model">
        <option value="claude">claude</option>
        <option value="qwen">qwen</option>
        <option value="opencode">opencode</option>
      </select>
      <select id="dash-mode">
        <option value="bypassPermissions">bypassPermissions</option>
        <option value="acceptEdits">acceptEdits</option>
        <option value="dontAsk">dontAsk</option>
        <option value="default">default</option>
        <option value="plan">plan</option>
      </select>
      <div id="dash-cwd-wrap" style="position:relative;">
        <input id="dash-cwd" placeholder="/path/to/project" autocomplete="off" style="background:var(--bg0);border:1px solid var(--bd);border-radius:5px;color:var(--tx1);font-size:12px;padding:4px 8px;width:275px;font-family:monospace;" />
        <div id="dash-cwd-drop" style="position:absolute;bottom:100%;left:0;width:100%;background:var(--bg1);border:1px solid var(--blue);border-radius:5px;z-index:999;display:none;max-height:200px;overflow-y:auto;margin-bottom:4px;"></div>
      </div>
    </div>
  </div>
  </div><!-- end dash-content -->
</div>

<!-- Layer 2: Task detail (chat) -->
<div id="layer2" style="display:none">
  <div id="chat-panel">
    <div id="topbar">
      <button id="back-btn">← Back</button>
      <span id="task-title">No task selected</span>
      <div id="cwd-wrap">
        <input id="cwd-box" placeholder="/path/to/project" title="Working directory for new tasks" autocomplete="off" />
        <div id="cwd-drop"></div>
      </div>
    </div>

    <div id="chat">
      <div id="empty-state">
        <div>Type a prompt below to start a task</div>
        <div class="hint">Tasks run in background — switch between them freely</div>
      </div>
    </div>

    <div id="input-area">
      <div id="input-row">
        <textarea id="prompt" placeholder="Follow-up message…" rows="1"></textarea>
      </div>
      <div id="controls">
        <select id="model-sel">
          <option value="claude">claude</option>
          <option value="qwen">qwen</option>
          <option value="opencode">opencode</option>
        </select>
        <select id="mode-sel">
          <option value="bypassPermissions">bypassPermissions</option>
          <option value="acceptEdits">acceptEdits</option>
          <option value="dontAsk">dontAsk</option>
          <option value="default">default</option>
          <option value="plan">plan</option>
        </select>
        <button id="stop-btn" onclick="stopActive()">⏹ stop active</button>
      </div>
    </div>
  </div>
  <div id="git-panel">
    <div id="git-panel-header">
      <span id="git-panel-title">Git</span>
      <span id="git-repo-badge" style="display:none">repo</span>
    </div>
    <div id="git-status-section">
      <div class="git-section-label">STATUS</div>
      <pre id="git-status-content">—</pre>
    </div>
    <div id="git-diff-section">
      <div class="git-section-label">DIFF</div>
      <div id="git-diff-content"></div>
    </div>
  </div>
</div>


<!-- Settings overlay -->
<div id="settings-overlay">
  <div id="settings-box">
    <h2>⚙ Settings</h2>
    <div class="settings-label">Theme</div>
    <div id="theme-grid"></div>
    <div id="settings-footer">
      <button id="settings-cancel">Cancel</button>
      <button id="settings-apply">Apply</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8001';
let activeTaskId = null;
let tasks = [];
let pollInterval = null;

function timeAgo(iso) {
  const sec = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (sec < 60) return sec + 's ago';
  if (sec < 3600) return Math.floor(sec/60) + 'm ago';
  if (sec < 86400) return Math.floor(sec/3600) + 'h ago';
  return Math.floor(sec/86400) + 'd ago';
}

function formatDuration(start, end) {
  if (!start || !end) return null;
  const sec = Math.floor((new Date(end) - new Date(start)) / 1000);
  if (sec < 60) return sec + 's';
  if (sec < 3600) return Math.floor(sec/60) + 'm ' + (sec%60) + 's';
  return Math.floor(sec/3600) + 'h ' + Math.floor((sec%3600)/60) + 'm';
}

function showLayer(n) {
  document.getElementById('layer1').style.display = n === 1 ? 'flex' : 'none';
  document.getElementById('layer2').style.display = n === 2 ? 'flex' : 'none';
}

async function openTask(id) {
  showLayer(2);
  await selectTask(id);
  refreshGitPanel();
}

function renderKanban() {
  const buckets = { running: [], done: [], stopped: [] };
  for (const t of tasks) {
    const key = (t.status === 'error') ? 'stopped' : (buckets[t.status] !== undefined ? t.status : 'stopped');
    buckets[key].push(t);
  }
  for (const [col, list] of Object.entries(buckets)) {
    const el = document.getElementById('cards-' + col);
    if (!el) continue;
    if (!list.length) {
      el.innerHTML = '<div class="col-empty">No tasks</div>';
      continue;
    }
    el.innerHTML = list.map(t => {
      const cwdShort = t.cwd ? t.cwd.split('/').slice(-2).join('/') : '';
      const badge = t.status === 'error' ? 'error' : t.status;
      const preview = t.preview ? esc(t.preview) : '';
      const dur = t.status !== 'running' ? formatDuration(t.created_at, t.finished_at) : null;
      return `<div class="task-card" onclick="openTask('${t.id}')">
        <div class="card-label">${esc(t.label)}</div>
        <div class="card-meta">
          <span class="card-badge badge-${badge}">${badge}</span>
          ${dur ? `<span class="card-dur">⏱ ${dur}</span>` : ''}
          <span class="card-cwd">${esc(cwdShort)}</span>
          <span class="card-time">${timeAgo(t.created_at)}</span>
        </div>
        ${preview ? `<div class="card-preview">${preview}</div>` : ''}
      </div>`;
    }).join('');
  }
}

function renderDiff(diffText) {
  if (!diffText) return '<div class="git-no-repo" style="color:var(--tx2);font-size:12px;padding:8px 0">No changes</div>';
  const lines = diffText.split('\n');
  let html = '';
  let inFile = false;
  for (const line of lines) {
    if (line.startsWith('diff --git')) {
      if (inFile) html += '</div>';
      const fname = line.replace('diff --git ', '').split(' b/').pop();
      html += `<div class="diff-file"><div class="diff-file-header">📄 ${esc(fname)}</div>`;
      inFile = true;
    } else if (line.startsWith('@@')) {
      html += `<span class="diff-hunk">${esc(line)}</span>`;
    } else if (line.startsWith('+') && !line.startsWith('+++')) {
      html += `<span class="diff-add">${esc(line)}</span>`;
    } else if (line.startsWith('-') && !line.startsWith('---')) {
      html += `<span class="diff-del">${esc(line)}</span>`;
    } else if (line.startsWith('index ') || line.startsWith('--- ') || line.startsWith('+++ ') || line.startsWith('Binary')) {
      // skip metadata lines
    } else if (line.trim()) {
      html += `<span class="diff-ctx">${esc(line)}</span>`;
    }
  }
  if (inFile) html += '</div>';
  return html || '<div style="color:var(--tx2);font-size:12px;padding:8px 0">No changes</div>';
}

async function refreshGitPanel() {
  if (!activeTaskId) return;
  try {
    const r = await fetch(`${API}/tasks/${activeTaskId}/gitdiff`);
    const data = await r.json();
    const badge = document.getElementById('git-repo-badge');
    const statusEl = document.getElementById('git-status-content');
    const diffEl = document.getElementById('git-diff-content');
    if (!data.is_git) {
      badge.style.display = 'none';
      statusEl.textContent = 'Not a git repo';
      diffEl.innerHTML = '';
      return;
    }
    badge.style.display = 'inline';
    statusEl.textContent = data.status.trim() || 'clean';
    diffEl.innerHTML = renderDiff(data.diff);
  } catch(e) {
    // silently ignore
  }
}

// ── API ──────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API + path, opts);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── Render chat ───────────────────────────────────────────────────────
function renderChat(history) {
  const chat = document.getElementById('chat');
  const empty = document.getElementById('empty-state');

  if (!history || !history.length) {
    chat.innerHTML = '';
    chat.appendChild(empty || makeEmpty());
    return;
  }

  const msgs = history.map(msg => {
    const role = msg.role;
    const meta = msg.metadata;

    if (meta) {
      // Tool call accordion
      const pending = meta.status === 'pending';
      const body = msg.content ? `<div class="tool-body">${renderMd(msg.content)}</div>` : '';
      return `<div class="msg tool${pending ? ' pending' : ''}">
        <div class="tool-header" onclick="toggleTool(this)">
          <span>${pending ? '⟳' : '▶'}</span>
          <span>${esc(meta.title)}</span>
        </div>
        ${body}
      </div>`;
    }

    if (role === 'user') {
      return `<div class="msg user">${esc(msg.content)}</div>`;
    }
    return `<div class="msg assistant">${renderMd(msg.content)}</div>`;
  }).join('');

  const atBottom = chat.scrollHeight - chat.scrollTop - chat.clientHeight < 80;
  chat.innerHTML = msgs;
  if (atBottom) chat.scrollTop = chat.scrollHeight;
}

function toggleTool(header) {
  const body = header.nextElementSibling;
  if (body) body.classList.toggle('open');
}

function makeEmpty() {
  const d = document.createElement('div');
  d.id = 'empty-state';
  d.innerHTML = '<div>Type a prompt below to start a task</div><div class="hint">Tasks run in background — switch between them freely</div>';
  return d;
}

// Simple markdown: code blocks, inline code, bold
function renderMd(text) {
  if (!text) return '';
  let s = esc(text);
  // fenced code blocks
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code}</code></pre>`);
  // inline code
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // bold
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // newlines
  s = s.replace(/\n/g, '<br>');
  return s;
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ── Actions ───────────────────────────────────────────────────────────
async function sendNewTask() {
  const promptEl = document.getElementById('dash-prompt');
  const prompt = promptEl.value.trim();
  if (!prompt) return;
  const model = document.getElementById('dash-model').value;
  const mode = document.getElementById('dash-mode').value;
  const cwd = document.getElementById('dash-cwd').value.trim();
  promptEl.value = '';
  promptEl.style.height = 'auto';
  await api('POST', '/tasks', { prompt, model, mode, cwd });
  await refreshTasks();
  // Stay on Layer 1 — do NOT call openTask or showLayer(2)
}

async function selectTask(id) {
  activeTaskId = id;
  const task = tasks.find(t => t.id === id);
  if (task) {
    document.getElementById('task-title').textContent = task.label;
    document.getElementById('cwd-box').value = task.cwd;
  }
  renderTaskList();
  const full = await api('GET', `/tasks/${id}`);
  renderChat(full.history);
}

async function sendPrompt() {
  const promptEl = document.getElementById('prompt');
  const prompt = promptEl.value.trim();
  if (!prompt) return;

  const active = tasks.find(t => t.id === activeTaskId);
  if (!active) return;

  promptEl.value = '';
  promptEl.style.height = 'auto';

  await api('POST', `/tasks/${activeTaskId}/message`, { prompt });
  await refreshTasks();
}

async function stopActive() {
  if (!activeTaskId) return;
  await api('POST', `/tasks/${activeTaskId}/stop`);
  await refreshTasks();
}

async function deleteActive() {
  if (!activeTaskId) return;
  await api('DELETE', `/tasks/${activeTaskId}`);
  activeTaskId = null;
  document.getElementById('task-title').textContent = 'No task selected';
  renderChat([]);
  await refreshTasks();
}

// ── Poll ──────────────────────────────────────────────────────────────
async function refreshTasks() {
  tasks = await api('GET', '/tasks');
  renderTaskList();
}

async function pollActive() {
  await refreshTasks();
  if (activeTaskId) {
    const full = await api('GET', `/tasks/${activeTaskId}`);
    renderChat(full.history);
    // Update title status
    const t = tasks.find(x => x.id === activeTaskId);
    if (t) document.getElementById('task-title').textContent = t.label + (t.status === 'running' ? ' ⟳' : '');
  }
  refreshGitPanel();
}

// Auto-resize textarea
document.getElementById('prompt').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Enter to send (Shift+Enter for newline)
document.getElementById('prompt').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();

});

// ── CWD autocomplete ──────────────────────────────────────────────────
(function() {
  const inp = document.getElementById('cwd-box');
  const drop = document.getElementById('cwd-drop');
  let selIdx = -1, opts = [], t;

  function show(items) {
    opts = items; selIdx = -1;
    drop.innerHTML = items.map((p, i) =>
      `<div class="cwd-opt" data-i="${i}">${p}</div>`).join('');
    drop.style.display = items.length ? 'block' : 'none';
    drop.querySelectorAll('.cwd-opt').forEach(el =>
      el.addEventListener('mousedown', e => { e.preventDefault(); pick(+el.dataset.i); }));
  }

  function pick(i) {
    inp.value = opts[i] + '/';
    drop.style.display = 'none';
    inp.focus();
    inp.dispatchEvent(new Event('input'));
  }

  function highlight() {
    drop.querySelectorAll('.cwd-opt').forEach((el, i) =>
      el.classList.toggle('sel', i === selIdx));
  }

  inp.addEventListener('input', () => {
    clearTimeout(t);
    t = setTimeout(async () => {
      const res = await fetch(`${API}/suggest?path=${encodeURIComponent(inp.value)}`);
      show(await res.json());
    }, 50);
  });

  inp.addEventListener('keydown', e => {
    if (drop.style.display === 'none') return;
    if (e.key === 'ArrowDown') { e.preventDefault(); selIdx = Math.min(selIdx + 1, opts.length - 1); highlight(); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); selIdx = Math.max(selIdx - 1, 0); highlight(); }
    else if (e.key === 'Enter' || e.key === 'Tab') { if (selIdx >= 0) { e.preventDefault(); pick(selIdx); } }
    else if (e.key === 'Escape') { drop.style.display = 'none'; }
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('#cwd-wrap')) drop.style.display = 'none';
  });
})();

let pendingTheme = null;

function applyTheme(name) {
  const t = THEMES[name];
  if (!t) return;
  const root = document.documentElement;
  for (const [k, v] of Object.entries(t)) root.style.setProperty('--' + k, v);
  localStorage.setItem('theme', name);
}

function buildThemeGrid() {
  const grid = document.getElementById('theme-grid');
  const current = localStorage.getItem('theme') || 'GitHub Dark';
  grid.innerHTML = Object.entries(THEMES).map(([name, t]) => `
    <div class="theme-swatch${name === current ? ' selected' : ''}" data-theme="${name}">
      <div class="swatch-preview" style="background:${t.bg1}">
        <span style="background:${t.blue}"></span>
        <span style="background:${t.green}"></span>
        <span style="background:${t.orange}"></span>
        <span style="background:${t.red}"></span>
      </div>
      <div class="swatch-name">${name}</div>
    </div>`).join('');
  grid.querySelectorAll('.theme-swatch').forEach(el => {
    el.addEventListener('click', () => {
      grid.querySelectorAll('.theme-swatch').forEach(s => s.classList.remove('selected'));
      el.classList.add('selected');
      pendingTheme = el.dataset.theme;
    });
  });
}

function openSettings() {
  pendingTheme = localStorage.getItem('theme') || 'GitHub Dark';
  buildThemeGrid();
  document.getElementById('settings-overlay').classList.add('open');
}

document.getElementById('nav-settings').addEventListener('click', openSettings);
document.getElementById('settings-cancel').addEventListener('click', () => {
  document.getElementById('settings-overlay').classList.remove('open');
});
document.getElementById('settings-apply').addEventListener('click', () => {
  if (pendingTheme) applyTheme(pendingTheme);
  document.getElementById('settings-overlay').classList.remove('open');
});
document.getElementById('settings-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('settings-overlay'))
    document.getElementById('settings-overlay').classList.remove('open');
});
